-items:center;gap:12px;flex-wrap:wrap\">\n      <h1 style=\"margin:0;font-size:21px;font-weight:650\">巡检与盯梢<\u002Fh1>\n      <span style=\"font-size:12.5px;color:#5c6470\">排查单的特殊应用:自动只读检查,只产清单与证据;异常由人升级为排查单<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"margin:10px 0 0;font-size:11.5px;color:#9a6a0f;background:#faf4e4;border:1px solid #e7dcba;border-radius:6px;padding:7px 12px;display:inline-block\">红线:全程受控只读 · 不自动碰生产 · 不自动建单 · 不打分、不进考核;升级与处置永远由人决定并留痕。<\u002Fp>\n\n    <!-- 自动巡检 -->\n    <section style=\"margin-top:16px;background:#ffffff;border:1px solid #dde1e4;border-radius:8px;overflow:hidden\">\n      <div style=\"display:flex;align-items:center;gap:10px;padding:11px 18px;border-bottom:1px solid #eef0f2;flex-wrap:wrap\">\n        <h2 style=\"margin:0;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#5c6470\">自动巡检计划<\u002Fh2>\n        <span style=\"font-size:11px;color:#8a919c\">按计划执行只读检查清单;每次运行的查询全部登记审计<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"overflow-x:auto\"><div style=\"min-width:760px\">\n        <sc-for list=\"{{ ppRows }}\" as=\"pp\" hint-placeholder-count=\"2\">\n          <div style=\"display:grid;grid-template-columns:minmax(180px,1fr) minmax(220px,1.4fr) 96px minmax(120px,auto);gap:12px;align-items:center;padding:11px 18px;border-bottom:1px solid #eef0f2\">\n            <span style=\"display:block;min-width:0\">\n              <span style=\"display:block;font-size:13px;font-weight:600\">{{ pp.name }}<\u002Fspan>\n              <span style=\"display:block;font-size:11px;color:#8a919c;margin-top:1px\">{{ pp.scope }}<\u002Fspan>\n            <\u002Fspan>\n            <span style=\"display:flex;gap:4px;flex-wrap:wrap\">\n              <sc-for list=\"{{ pp.checkChips }}\" as=\"pc\" hint-placeholder-count=\"4\">\n                <span style=\"font-size:10.5px;color:#38414b;background:#f2f4f5;border:1px solid #dde1e4;border-radius:4px;padding:0 6px;white-space:nowrap\">{{ pc.t }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;color:#5c6470\">{{ pp.schedule }}<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:8px;justify-content:flex-end\">\n              <span style=\"font-size:11px;color: {{ pp.stColor }}\">{{ pp.stLabel }}<\u002Fspan>\n              <button role=\"switch\" aria-checked=\"{{ pp.swChecked }}\" aria-label=\"{{ pp.swAria }}\" sc-camel-on-click=\"{{ pp.swClick }}\" disabled=\"{{ pp.swDisabled }}\" title=\"{{ pp.swReason }}\" style=\"flex:none;width:34px;height:19px;border-radius:999px;border:1px solid {{ pp.swBd }};background: {{ pp.swBg }};cursor: {{ pp.swCursor }};position:relative;padding:0\">\n                <span aria-hidden=\"true\" style=\"position:absolute;top:2px;left: {{ pp.swKnob }};width:13px;height:13px;border-radius:50%;background:#ffffff;box-shadow:0 1px 3px rgba(20,26,32,0.3);transition:left 150ms ease-out\"><\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 巡检运行记录 -->\n    <section style=\"margin-top:14px;background:#ffffff;border:1px solid #dde1e4;border-radius:8px;overflow:hidden\">\n      <div style=\"display:flex;align-items:center;gap:10px;padding:11px 18px;border-bottom:1px solid #eef0f2;flex-wrap:wrap\">\n        <h2 style=\"margin:0;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#5c6470\">巡检运行记录<\u002Fh2>\n        <span style=\"font-size:11px;color:#8a919c\">平台失败如实展示,不包装成\"全部正常\";点击行展开发现清单<\u002Fspan>\n      <\u002Fdiv>\n      <sc-for list=\"{{ prRows }}\" as=\"pr\" hint-placeholder-count=\"3\">\n        <div style=\"border-bottom:1px solid #eef0f2\">\n          <button sc-camel-on-click=\"{{ pr.toggle }}\" aria-expanded=\"{{ pr.openAria }}\" style=\"width:100%;font:inherit;text-align:left;border:none;background: {{ pr.rowBg }};cursor:pointer;display:flex;align-items:center;gap:12px;padding:11px 18px;flex-wrap:wrap\" style-hover=\"background:#f7f8f9\">\n          <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;color:#5c6470;white-space:nowrap\">{{ pr.time }}<\u002Fspan>\n            <span style=\"display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:1px 8px;border-radius:4px;border:1px solid {{ pr.stBd }};color: {{ pr.stColor }};background: {{ pr.stBg }};white-space:nowrap\">{{ pr.stIcon }} {{ pr.stLabel }}<\u002Fspan>\n            <span style=\"font-size:12.5px;font-weight:500;min-width:0\">{{ pr.plan }} — {{ pr.summary }}<\u002Fspan>\n            <span style=\"margin-left:auto;font-size:11px;color:#8a919c;white-space:nowrap\">{{ pr.queries }} · {{ pr.caret }}<\u002Fspan>\n          <\u002Fbutton>\n          <sc-if value=\"{{ pr.open }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:2px 18px 13px 18px;display:flex;flex-direction:column;gap:8px\">\n              <sc-if value=\"{{ pr.noFindings }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"margin:0;font-size:12px;color:#8a919c\">{{ pr.emptyText }}<\u002Fp><\u002Fsc-if>\n              <sc-for list=\"{{ pr.fRows }}\" as=\"pf\" hint-placeholder-count=\"2\">\n                <div style=\"display:flex;gap:12px;align-items:flex-start;border:1px solid #eef0f2;border-left:3px solid #b07a18;border-radius:6px;padding:10px 13px;background:#fbfaf6;flex-wrap:wrap\">\n                  <div style=\"min-width:0;flex:1 1 320px\">\n                    <p style=\"margin:0;font-size:12.5px;font-weight:600\">{{ pf.check }} · <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px\">{{ pf.service }}<\u002Fspan><\u002Fp>\n                    <p style=\"margin:3px 0 0;font-size:12px;line-height:1.6;color:#38414b\">{{ pf.text }}<\u002Fp>\n                    <p style=\"margin:3px 0 0;font-size:11px;color:#8a919c\">窗口 {{ pf.window }} · {{ pf.suggest }}<\u002Fp>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ pf.escalated }}\" hint-placeholder-val=\"{{ false }}\">\n                    <a href=\"{{ pf.escHref }}\" style=\"flex:none;align-self:center;font-size:12px;white-space:nowrap\">已升级 → {{ pf.escNo }}<\u002Fa>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ pf.canEsc }}\" hint-placeholder-val=\"{{ true }}\">\n                    <button sc-camel-on-click=\"{{ pf.esc }}\" disabled=\"{{ pf.escDisabled }}\" title=\"{{ pf.escReason }}\" style=\"flex:none;align-self:center;font:inherit;font-size:12px;font-weight:600;cursor: {{ pf.escCursor }};padding:5px 13px;border-radius:6px;border:1px solid #1f7a53;background:rgba(31,122,83,0.05);color:#1f7a53;opacity: {{ pf.escOpacity }}\" style-hover=\"background:rgba(31,122,83,0.1)\">升级为排查单<\u002Fbutton>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fsection>\n\n    <!-- 发布盯梢 -->\n    <section style=\"margin-top:14px\">\n      <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:9px;flex-wrap:wrap\">\n        <h2 style=\"margin:0;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#5c6470\">发布盯梢<\u002Fh2>\n        <span style=\"font-size:11px;color:#8a919c\">灰度期间新老版本只读对比;发现劣化只建议、由人决定升级与回滚<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:12px\">\n        <sc-for list=\"{{ wtRows }}\" as=\"wt\" hint-placeholder-count=\"3\">\n          <article style=\"background:#ffffff;border:1px solid #dde1e4;border-radius:8px;padding:13px 16px;display:flex;flex-direction:column;gap:9px\">\n            <header style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\">\n              <h3 style=\"margin:0;font-size:13px;font-weight:650;font-family:'JetBrains Mono',ui-monospace,monospace\">{{ wt.service }}<\u002Fh3>\n              <span style=\"display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;padding:1px 9px;border-radius:4px;border:1px solid {{ wt.stBd }};color: {{ wt.stColor }};background: {{ wt.stBg }};white-space:nowrap\"><span aria-hidden=\"true\" style=\"animation: {{ wt.stAnim }}\">{{ wt.stIcon }}<\u002Fspan>{{ wt.stLabel }}<\u002Fspan>\n              <span style=\"margin-left:auto;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;color:#8a919c\">{{ wt.old }} → {{ wt.version }}<\u002Fspan>\n            <\u002Fheader>\n            <div style=\"display:flex;gap:4px;align-items:center;flex-wrap:wrap\">\n              <span style=\"font-size:10.5px;color:#8a919c\">放量<\u002Fspan>\n              <sc-for list=\"{{ wt.stagePills }}\" as=\"wsp\" hint-placeholder-count=\"4\">\n                <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;font-weight:600;padding:1px 8px;border-radius:999px;border:1px solid {{ wsp.bd }};background: {{ wsp.bg }};color: {{ wsp.color }}\">{{ wsp.t }}<\u002Fspan>\n              <\u002Fsc-for>\n              <span style=\"margin-left:auto;font-size:10.5px;color:#8a919c\">{{ wt.window }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"border:1px solid #eef0f2;border-radius:6px;overflow:hidden\">\n              <div style=\"display:grid;grid-template-columns:minmax(110px,1.2fr) 1fr 1fr 1fr 40px;gap:8px;padding:6px 12px;background:#f7f8f9;font-size:10px;color:#5c6470;letter-spacing:0.03em\">\n                <span>指标<\u002Fspan><span>旧版<\u002Fspan><span>灰度新版<\u002Fspan><span>差异<\u002Fspan><span><\u002Fspan>\n              <\u002Fdiv>\n              <sc-for list=\"{{ wt.mRows }}\" as=\"wm\" hint-placeholder-count=\"3\">\n                <div style=\"display:grid;grid-template-columns:minmax(110px,1.2fr) 1fr 1fr 1fr 40px;gap:8px;padding:6px 12px;border-top:1px solid #eef0f2;font-size:11.5px;align-items:center;background: {{ wm.bg }}\">\n                  <span style=\"color:#38414b\">{{ wm.name }}<\u002Fspan>\n                  <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;color:#5c6470\">{{ wm.old }}<\u002Fspan>\n                  <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;font-weight:600;color: {{ wm.neuColor }}\">{{ wm.neu }}<\u002Fspan>\n                  <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;color: {{ wm.neuColor }}\">{{ wm.diff }}<\u002Fspan>\n                  <span aria-hidden=\"true\" style=\"text-align:right;font-weight:700;color: {{ wm.neuColor }}\">{{ wm.icon }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <p style=\"margin:0;font-size:11px;color:#5c6470;line-height:1.6\">{{ wt.note }}<\u002Fp>\n            <div style=\"display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-top:1px solid #eef0f2;padding-top:9px\">\n              <sc-if value=\"{{ wt.escalatedShown }}\" hint-placeholder-val=\"{{ false }}\">\n                <a href=\"{{ wt.escHref }}\" style=\"font-size:12px;white-space:nowrap\">已升级 → {{ wt.escNo }}<\u002Fa>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ wt.actShown }}\" hint-placeholder-val=\"{{ false }}\">\n                <button sc-camel-on-click=\"{{ wt.esc }}\" disabled=\"{{ wt.escDisabled }}\" title=\"{{ wt.escReason }}\" style=\"font:inherit;font-size:12px;font-weight:600;cursor: {{ wt.escCursor }};padding:5px 13px;border-radius:6px;border:1px solid #1f7a53;background:rgba(31,122,83,0.05);color:#1f7a53;opacity: {{ wt.escOpacity }}\" style-hover=\"background:rgba(31,122,83,0.1)\">升级为排查单<\u002Fbutton>\n                <button sc-camel-on-click=\"{{ wt.notify }}\" disabled=\"{{ wt.notified }}\" style=\"font:inherit;font-size:12px;cursor: {{ wt.ntCursor }};padding:5px 13px;border-radius:6px;border:1px solid #c6cbd0;background:#ffffff;color: {{ wt.ntColor }}\" style-hover=\"border-color:#1f7a53;color:#1f7a53\">{{ wt.ntLabel } 245bdb\">{{ tkLabel }}<\u002Fbutton>\n                  <button style=\"font:inherit;font-size:12.5px;cursor:pointer;padding:6px 14px;border-radius:6px;border:1px solid #f0c4bf;background:#fff;color:#d83931\" style-hover=\"background:#fdf1f0\">停止排查<\u002Fbutton>\n                  <a href=\"#/tickets/t-run\" style=\"margin-left:auto;align-self:center;font-size:12.5px;white-space:nowrap\">在工作台打开 →<\u002Fa>\n                <\u002Fdiv>\n                <p style=\"margin:8px 0 0;font-size:11px;color:#8f959e\">接管 / 停止需填写原因并经权限校验;群内只推送脱敏摘要,完整证据在工作台按权限查看并留痕。<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ③ 等待补充卡 -->\n      <div>\n        <sc-if value=\"{{ showNotes }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"display:flex;justify-content:flex-end;margin-bottom:5px\"><span style=\"font-size:10.5px;font-weight:700;color:#9a6a0f;background:#faf1dc;border:1px solid #e5d5a6;border-radius:4px;padding:1px 8px\">改进③ 上下文不足只追问一个关键问题,卡内表单直接回答,期间不访问生产<\u002Fspan><\u002Fdiv><\u002Fsc-if>\n        <div style=\"display:flex;gap:10px;align-items:flex-start\">\n          <span aria-hidden=\"true\" style=\"flex:none;display:grid;place-items:center;width:34px;height:34px;border-radius:50%;background:#3370ff;color:#fff;font-size:11px;font-weight:700\">TS<\u002Fspan>\n          <div style=\"min-width:0;flex:1;max-width:560px\">\n            <div style=\"font-size:12px;color:#8f959e;margin-bottom:4px\">TroubleShoot <span style=\"margin-left:6px\">18:02 · 私聊发起人<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#ffffff;border:1px solid #e2e5ea;border-radius:10px;overflow:hidden\">\n              <div style=\"background:#fff8e6;padding:10px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap\">\n                <b style=\"color:#8a6c0a;font-size:14px;min-width:0\">排查单 <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:13px\">#TS-20260712-0031<\u002Fspan> <span style=\"white-space:nowrap\">· 等待补充<\u002Fspan><\u002Fb>\n              <\u002Fdiv>\n              <div style=\"padding:12px 16px\">\n                <p style=\"margin:0;font-size:13px;font-weight:600;line-height:1.6\">漏跑的是哪个对账日期或批次(jobId)?<\u002Fp>\n                <p style=\"margin:5px 0 0;font-size:12px;color:#5c6470;line-height:1.6\">已固化:recon-batch · PRO;仅缺时间窗与批次线索。24h 未补充将转「证据不足 · 挂起」;补充前<b>不会访问生产数据源,也不签发查询凭证<\u002Fb>。<\u002Fp>\n                <sc-if value=\"{{ waitDone }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex;gap:8px;align-items:flex-start;margin-top:10px;background:#eef9f0;border:1px solid #c3e8cd;border-radius:6px;padding:8px 12px;font-size:12px;color:#1f7a3f\"><span aria-hidden=\"true\" style=\"font-weight:700\">✓<\u002Fspan>已收到:范围固化,进入受控取证队列;本卡与工作台状态已同步更新。<\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ waitNotDone }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"display:flex;gap:8px;margin-top:10px\">\n                    <input sc-camel-on-input=\"{{ setWaitText }}\" placeholder=\"如:对账日期 07-11,jobId=recon-20260711-03\" style=\"flex:1;min-width:0;font:inherit;font-size:12.5px;padding:7px 11px;border-radius:6px;border:1px solid #d0d3d9;background:#fff;color:#1f2329\">\n                    <button sc-camel-on-click=\"{{ submitWait }}\" style=\"flex:none;font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;padding:7px 14px;border-radius:6px;border:1px solid #3370ff;background:#3370ff;color:#fff\" style-hover=\"background:#2b5fe0\">提交补充<\u002Fbutton>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ waitError }}\" hint-placeholder-val=\"{{ false }}\"><p role=\"alert\" style=\"margin:6px 0 0;font-size:11.5px;color:#d83931\">{{ waitError }}<\u002Fp><\u002Fsc-if>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ④ 完成卡(候选→复核) -->\n      <div>\n        <sc-if value=\"{{ showNotes }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"display:flex;justify-content:flex-end;margin-bottom:5px\"><span style=\"font-size:10.5px;font-weight:700;color:#9a6a0f;background:#faf1dc;border:1px solid #e5d5a6;border-radius:4px;padding:1px 8px\">改进④⑤ 结论卡先给一句话+边界;证据与方案折叠展开;复核动作群内直达(理由必填 · 权限校验 · 写审计)<\u002Fspan><\u002Fdiv><\u002Fsc-if>\n        <div style=\"display:flex;gap:10px;align-items:flex-start\">\n          <span aria-hidden=\"true\" style=\"flex:none;display:grid;place-items:center;width:34px;height:34px;border-radius:50%;background:#3370ff;color:#fff;font-size:11px;font-weight:700\">TS<\u002Fspan>\n          <div style=\"min-width:0;flex:1;max-width:560px\">\n            <div style=\"font-size:12px;color:#8f959e;margin-bottom:4px\">TroubleShoot <span style=\"margin-left:6px\">16:41 · 话题回复<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#ffffff;border:1px solid #e2e5ea;border-radius:10px;overflow:hidden\">\n              <div style=\"background: {{ doneHeadBg }};padding:10px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap\">\n                <b style=\"color: {{ doneHeadColor }};font-size:14px\">排查单 <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace\">#TS-20260711-0026<\u002Fspan> · {{ doneHeadLabel }}<\u002Fb>\n                <span style=\"margin-left:auto;font-size:11px;color:#8f959e\">用时 38m · 证据 7 条<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"padding:12px 16px\">\n                <p style=\"margin:0;font-size:12.5px\"><a href=\"#\" sc-camel-on-click=\"{{ noop }}\" style=\"font-weight:600\">@王喆<\u002Fa> 候选根因已生成,请复核:<\u002Fp>\n                <p style=\"margin:7px 0 0;font-size:13px;line-height:1.7\"><b>15:40 发布(commit a1b2c3d)为订单标签引入逐条查询(N+1)<\u002Fb>:单请求 DB 往返 12→412 次,DB span 占比 97%,连接池打满引发超时。<\u002Fp>\n                <div style=\"display:flex;gap:6px;flex-wrap:wrap;margin-top:9px\">\n                  <span style=\"font-size:11px;font-weight:600;color:#8a6c0a;background:#fff8e6;border:1px solid #f0dfae;border-radius:4px;padding:1px 8px\">置信 中 · 待人工复核<\u002Fspan>\n                  <span style=\"font-size:11px;font-weight:600;color:#5c6470;background:#f5f6f7;border:1px solid #e2e5ea;border-radius:4px;padding:1px 8px\">边界:DB 执行计划未取证<\u002Fspan>\n                  <span style=\"font-size:11px;font-weight:600;color:#1f7a3f;background:#eef9f0;border:1px solid #c3e8cd;border-radius:4px;padding:1px 8px\">建议:回滚验证已闭环<\u002Fspan>\n                <\u002Fdiv>\n\n                <!-- 折叠:关键证据 -->\n                <button sc-camel-on-click=\"{{ toggleEv }}\" aria-expanded=\"{{ evAria }}\" style=\"width:100%;margin-top:11px;font:inherit;text-align:left;font-size:12.5px;font-weight:600;color:#1f2329;cursor:pointer;background:#fafbfc;border:1px solid #e2e5ea;border-radius:7px;padding:8px 13px;display:flex;align-items:center;gap:8px\" style-hover=\"border-color:#c8daff\"><span aria-hidden=\"true\" style=\"color:#8f959e\">{{ evCaret }}<\u002Fspan>关键证据(3 / 7)<span style=\"margin-left:auto;font-size:11px;color:#8f959e;font-weight:400\">点 evidenceRef 深链到工作台证据抽屉<\u002Fspan><\u002Fbutton>\n                <sc-if value=\"{{ evOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"border:1px solid #e2e5ea;border-top:none;border-radius:0 0 7px 7px;padding:9px 13px;display:flex;flex-direction:column;gap:6px;font-size:12px;line-height:1.6\">\n                    <p style=\"margin:0\"><a href=\"#/tickets/t-conf?tab=evidence&amp;ev=E-04\" style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;font-weight:700\">[E-04]<\u002Fa> Git diff:标签装配改为循环内逐条查询(15:40 发布)<\u002Fp>\n                    <p style=\"margin:0\"><a href=\"#/tickets/t-conf?tab=evidence&amp;ev=E-05\" style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;font-weight:700\">[E-05]<\u002Fa> 发布前后对比:单请求 DB 往返 12 → 412 次<\u002Fp>\n                    <p style=\"margin:0\"><a href=\"#/tickets/t-conf?tab=evidence&amp;ev=E-06\" style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;font-weight:700\">[E-06]<\u002Fa> 回滚(17:48)后错误率回落至 0.2% 基线<\u002Fp>\n                    <p style=\"margin:2px 0 0;font-size:11px;color:#8f959e\">群内仅脱敏摘要;原文与完整证据链按人员/项目/排查单权限在工作台查看,读取留痕。<\u002Fp>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <!-- 折叠:解决方案 -->\n                <button sc-camel-on-click=\"{{ toggleSol }}\" aria-expanded=\"{{ solAria }}\" style=\"width:100%;margin-top:8px;font:inherit;text-align:left;font-size:12.5px;font-weight:600;color:#1f2329;cursor:pointer;background:#fafbfc;border:1px solid #e2e5ea;border-radius:7px;padding:8px 13px;display:flex;align-items:center;gap:8px\" style-hover=\"border-color:#c8daff\"><span aria-hidden=\"true\" style=\"color:#8f959e\">{{ solCaret }}<\u002Fspan>解决方案(短期 / 中期 / 长期)<span style=\"margin-left:auto;font-size:11px;color:#1f7a3f;font-weight:400\">处置由人执行<\u002Fspan><\u002Fbutton>\n                <sc-if value=\"{{ solOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"border:1px solid #e2e5ea;border-top:none;border-radius:0 0 7px 7px;padding:9px 13px;font-size:12px;line-height:1.7\">\n                    <p style=\"margin:0\"><b style=\"color:#d83931\">1. 短期·止血<\u002Fb>:回滚 a1b2c3d(已完成)· 标签展示降级开关待命 · 阈值临时收紧观察 30 分钟<\u002Fp>\n                    <p style=\"margin:4px 0 0\"><b style=\"color:#8a6c0a\">2. 中期·加固<\u002Fb>:标签装配批量化(评审中)· 流水线加 DB 往返回归断言 · 压测补标签覆盖<\u002Fp>\n                    <p style=\"margin:4px 0 0\"><b style=\"color:#1f7a3f\">3. 长期·治理<\u002Fb>:读路径接只读副本/缓存 · SQL 审核卡点 · EXPLAIN 巡检回补索引形态<\u002Fp>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <!-- 复核动作 -->\n                <sc-if value=\"{{ confirmDone }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex;gap:8px;align-items:flex-start;margin-top:11px;background:#eef9f0;border:1px solid #c3e8cd;border-radiu e=\"font:inherit;font-size:13px;font-weight:600;cursor:pointer;padding:7px 17px;border-radius:6px;border:1px solid #1f7a53;background:#1f7a53;color:#f2faf6\" style-hover=\"background:#176544\">保存绑定<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ══════════ 手动新建排查单 ══════════ -->\n  <sc-if value=\"{{ nOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ mCancel }}\" style=\"position:fixed;inset:0;z-index:70;background:rgba(20,26,32,0.42);display:grid;place-items: {{ mPlace }};padding: {{ mPad }}\">\n      <div ref=\"{{ mRef }}\" role=\"dialog\" aria-modal=\"true\" aria-label=\"新建排查单\" sc-camel-on-click=\"{{ mStop }}\" style=\"width:560px;max-width:100%;max-height:calc(100vh - 48px);overflow-y:auto;background:#ffffff;border:1px solid #dde1e4;border-radius: {{ mRadius }};box-shadow:0 24px 60px rgba(20,26,32,0.28);box-sizing:border-box\">\n        <div style=\"display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid #eef0f2\">\n          <h2 style=\"margin:0;font-size:14.5px;font-weight:650\">新建排查单<\u002Fh2>\n          <button sc-camel-on-click=\"{{ mCancel }}\" aria-label=\"关闭\" style=\"margin-left:auto;font:inherit;font-size:16px;line-height:1;border:none;background:none;cursor:pointer;color:#8a919c;padding:4px\" style-hover=\"color:#242a31\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:16px 20px;display:flex;flex-direction:column;gap:13px\">\n          <label style=\"display:flex;flex-direction:column;gap:5px\">\n            <span style=\"font-size:12px;color:#5c6470\">问题描述 <b style=\"color:#bb3a2a\">*<\u002Fb><\u002Fspan>\n            <textarea sc-camel-on-input=\"{{ nSetDesc }}\" placeholder=\"发生了什么?何时开始?影响哪个接口或业务?\" style=\"font:inherit;font-size:13px;min-height:68px;resize:vertical;padding:8px 11px;border-radius:6px;border:1px solid #dde1e4;background:#f7f8f9;color:#242a31;box-sizing:border-box\"><\u002Ftextarea>\n          <\u002Flabel>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px\">\n            <label style=\"display:flex;flex-direction:column;gap:5px\">\n              <span style=\"font-size:12px;color:#5c6470\">项目 <b style=\"color:#bb3a2a\">*<\u002Fb><\u002Fspan>\n              <sc-raw-select sc-camel-on-change=\"{{ nSetProject }}\" style=\"font:inherit;font-size:13px;padding:8px 10px;border-radius:6px;border:1px solid #dde1e4;background:#f7f8f9;color:#242a31\">\n                <option value=\"\">选择项目…<\u002Foption><option value=\"交易中台\">交易中台<\u002Foption><option value=\"支付中台\">支付中台<\u002Foption><option value=\"营销中台\">营销中台<\u002Foption>\n              <\u002Fsc-raw-select>\n            <\u002Flabel>\n            <div style=\"display:flex;flex-direction:column;gap:5px\">\n              <span style=\"font-size:12px;color:#5c6470\">环境(默认 PRO · 平台面向生产排障)<\u002Fspan>\n              <div role=\"radiogroup\" aria-label=\"环境\" style=\"display:flex;gap:6px\">\n                <sc-for list=\"{{ nEnvs }}\" as=\"ne\" hint-placeholder-count=\"3\">\n                  <button role=\"radio\" aria-checked=\"{{ ne.checked }}\" sc-camel-on-click=\"{{ ne.pick }}\" style=\"flex:1;font:inherit;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;font-weight:600;cursor:pointer;padding:7px 0;border-radius:6px;border:1px solid {{ ne.bd }};background: {{ ne.bg }};color: {{ ne.color }}\">{{ ne.label }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px\">\n            <label style=\"display:flex;flex-direction:column;gap:5px\">\n              <span style=\"font-size:12px;color:#5c6470\">异常时间 <b style=\"color:#bb3a2a\">*<\u002Fb><\u002Fspan>\n              <input type=\"datetime-local\" sc-camel-on-input=\"{{ nSetTime }}\" max=\"2026-07-12T18:30\" style=\"font:inherit;font-size:13px;padding:7px 10px;border-radius:6px;border:1px solid #dde1e4;background:#f7f8f9;color:#242a31\">\n            <\u002Flabel>\n            <label style=\"display:flex;flex-direction:column;gap:5px\">\n              <span style=\"font-size:12px;color:#5c6470\">服务 / 目标资源 <b style=\"color:#bb3a2a\">*<\u002Fb><\u002Fspan>\n              <input sc-camel-on-input=\"{{ nSetService }}\" placeholder=\"如 order-service\" style=\"font:inherit;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12.5px;padding:7px 10px;border-radius:6px;border:1px solid #dde1e4;background:#f7f8f9;color:#242a31\">\n            <\u002Flabel>\n          <\u002Fdiv>\n          <label style=\"display:flex;flex-direction:column;gap:5px\">\n            <span style=\"font-size:12px;color:#5c6470\">有效线索(traceId / 业务 ID / 关键词 — 至少一条才能发起取证)<\u002Fspan>\n            <input sc-camel-on-input=\"{{ nSetClue }}\" placeholder=\"如 t-9f21ac77d0e14b02 或 订单号 demo-20260712-88\" style=\"font:inherit;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12.5px;padding:7px 10px;border-radius:6px;border:1px solid #dde1e4;background:#f7f8f9;color:#242a31\">\n          <\u002Flabel>\n          <div style=\"border:1px solid #eef0f2;background:#f7f8f9;border-radius:6px;padding:10px 13px\">\n            <h3 style=\"margin:0 0 4px;font-size:11px;font-weight:700;color:#5c6470;letter-spacing:0.05em\">提交后即将冻结的范围<\u002Fh3>\n            <p style=\"margin:0;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;line-height:1.7;color:#38414b;overflow-wrap:anywhere\">{{ nFreeze }}<\u002Fp>\n            <p style=\"margin:5px 0 0;font-size:11px;color:#8a919c;line-height:1.55\">{{ nFreezeNote }}<\u002Fp>\n          <\u002Fdiv>\n          <sc-if value=\"{{ nError }}\" hint-placeholder-val=\"{{ false }}\">\n            <p role=\"alert\" style=\"margin:0;font-size:12px;color:#bb3a2a\">{{ nError }}<\u002Fp>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:flex-end;gap:8px;padding:13px 20px;border-top:1px solid #eef0f2\">\n          <button sc-camel-on-click=\"{{ mCancel }}\" style=\"font:inherit;font-size:13px;cursor:pointer;padding:7px 15px;border-radius:6px;border:1px solid #dde1e4;background:#ffffff;color:#242a31\" style-hover=\"border-color:#aeb5bc\">取消<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ nSubmit }}\" style=\"font:inherit;font-size:13px;font-weight:600;cursor:pointer;padding:7px 17px;border-radius:6px;border:1px solid #1f7a53;background:#1f7a53;color:#f2faf6\" style-hover=\"background:#176544\">创建排查单<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1440, &quot;height&quot;: 900 },\n  &quot;viewMode&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;工程视图&quot;, &quot;简报视图&quot;], &quot;default&quot;: &quot;工程视图&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;整体感觉&quot;, &quot;description&quot;: &quot;简报视图为评审浓缩:详情只留概览(判断/事实/候选),隐藏查询预算、原始输入、token 安全摘要与技术 Tab&quot; },\n  &quot;statusTone&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;素净&quot;, &quot;标准&quot;, &quot;鲜明&quot;], &quot;default&quot;: &quot;标准&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;整体感觉&quot;, &quot;description&quot;: &quot;全局状态色强度:徽章、候选、查询结果、审计主体等所有状态块一起变&quot; },\n  &quot;showDemoBar&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;演示&quot;, &quot;description&quot;: &quot;隐藏顶部演示控制条,适合截图与正式评审&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    db: null,            // 动态 import 的基础数据\n    overlay: null,       // localStorage 持久化的演示改动(排查单覆盖 + 新建单)\n    route: { view: 'list', ticketId: null, runId: null, ev: null, tab: 'overview' },\n    roleId: 'dev', dataset: 'current',\n    q: '', fStatus: '全部', fProject: '', fEnv: '', fSource: '', fTime: '',\n    vw: typeof window !== 'undefined' ? window.innerWidth : 1280,\n    flashText: '', flashTone: 'green',\n    modal: null,         // {kind, ...} 各类弹窗\n    rawOpen: {},         // 原文展开状态 evidenceRef->bool\n    auditF: { kind: '', result: '', tool: '', q: '', ticket: '' },\n    connSel: null,\n    fs: { rawOpen: false, tsStarted: true, suppOpen: false, suppDone: false, suppKind: '现象描述', suppError: '', tkDone: false, waitDone: false, waitError: '', evOpen: false, solOpen: true, confirmMode: null, confirmDone: false, confirmReason: '', confirmError: '', woDone: false, stormStarted: false }\n  };\n\n  LS_KEY = 'ts_v3_demo_state';\n\n  // ─── 色板(tone) ───\n  TONES = {\n    green: { c: '#1b7a4e', bg: 'rgba(27,122,78,0.08)', bd: 'rgba(27,122,78,0.38)' },\n    blue:  { c: '#2461ad', bg: 'rgba(36,97,173,0.08)', bd: 'rgba(36,97,173,0.38)' },\n    amber: { c: '#9a6a0f', bg: 'rgba(176,122,24,0.10)', bd: 'rgba(176,122,24,0.42)' },\n    red:   { c: '#bb3a2a', bg: 'rgba(187,58,42,0.08)', bd: 'rgba(187,58,42,0.38)' },\n    gray:  { c: '#5f6874', bg: 'rgba(95,104,116,0.09)', bd: 'rgba(95,104,116,0.36)' }\n  };\n  tone(t) {\n    const base = this.TONES[t] || this.TONES.gray;\n    const mode = this.props.statusTone ?? '标准';\n    if (mode === '标准') return base;\n    const scale = (str, f) => str.replace(/([\\d.]+)\\)$/, (mm, a) => Math.min(0.92, +a * f).toFixed(3) + ')');\n    if (mode === '素净') return { c: base.c, bg: scale(base.bg, 0.4), bd: scale(base.bd, 0.5) };\n    return { c: base.c, bg: scale(base.bg, 2.4), bd: scale(base.bd, 1.6) };\n  }\n\n  componentDidMount() {\n    Promise.resolve(window.TS_DATA).then(m => {\n      let ov = null;\n      try { ov = JSON.parse(localStorage.getItem(this.LS_KEY) || 'null'); } catch (e) { ov = null; }\n      const st = { db: m, overlay: ov || { tickets: {}, newTickets: [] } };\n      if (ov && ov.roleId) st.roleId = ov.roleId;\n      if (ov && ov.dataset) st.dataset = ov.dataset;\n      this.setState(st);\n      this.applyHash();\n    });\n    this._onHash = () => this.applyHash();\n    this._onResize = () => this.setState({ vw: window.innerWidth });\n    this._onKey = e => { if (e.key === 'Escape' && this.state.modal) this.closeModal(); };\n    window.addEventListener('hashchange', this._onHash);\n    window.addEventListener('resize', this._onResize);\n    window.addEventListener('keydown', this._onKey);\n    if (!location.hash) history.replaceState(null, '', '#/tickets');\n  }\n  componentWillUnmount() {\n    window.removeEventListener('hashchange', this._onHash);\n    window.removeEventListener('resize', this._onResize);\n    window.removeEventListener('keydown', this._onKey);\n  }\n\n  // ─── hash 路由: #/tickets · #/tickets/:id?run=R2&ev=E-03&tab=evidence · #/audit · #/connectors ───\n  applyHash() {\n    const h = (location.hash || '#/tickets').slice(1);\n    const [pathPart, qsPart] = h.split('?');\n    const seg = pathPart.split('/').filter(Boolean);\n    const qs = {}; (qsPart || '').split('&').forEach(kv => { const [k, v] = kv.split('='); if (k) qs[k] = decodeURIComponent(v || ''); });\n    let route = { view: 'list', ticketId: null, runId: null, ev: null, tab: 'overview' };\n    if (seg[0] === 'tickets' && seg[1]) route = { view: 'detail', ticketId: seg[1], runId: qs.run || null, ev: qs.ev || null, tab: qs.tab || 'overview' };\n    else if (seg[0] === 'audit') route = { view: 'audit', ticketId: null, runId: null, ev: null, tab: 'overview' };\n    else if (seg[0] === 'patrol') route = { view: 'patrol', ticketId: null, runId: null, ev: null, tab: 'overview' };\n    else if (seg[0] === 'feishu') route = { view: 'feishu', ticketId: null, runId: null, ev: null, tab: 'overview' };\n    else if (seg[0] === 'connectors') route = { view: 'connectors', ticketId: null, runId: null, ev: null, tab: 'overview' };\n    this.setState({ route });\n  }\n  nav(hash) { if (location.hash !== hash) location.hash = hash; else this.applyHash(); }\n  detailHash(id, opt) {\n    const o = opt || {}; const parts = [];\n    if (o.run) parts.push('run=' + o.run);\n    if (o.tab && o.tab !== 'overview') parts.push('tab=' + o.tab);\n    if (o.ev) parts.push('ev=' + encodeURIComponent(o.ev));\n    return '#/tickets/' + id + (parts.length ? '?' + parts.join('&') : '');\n  }\n\n  // ─── 持久化 ───\n  saveOverlay(mut) {\n    const ov = { ...this.state.overlay, ...mut, roleId: this.state.roleId, dataset: this.state.dataset };\n    try { localStorage.setItem(this.LS_KEY, JSON.stringify(ov)); } catch (e) {}\n    this.setState({ overlay: ov });\n  }\n  persistPrefs() {\n    const ov = { ...this.state.overlay, roleId: this.state.roleId, dataset: this.state.dataset };\n    try { localStorage.setItem(this.LS_KEY, JSON.stringify(ov)); } catch (e) {}\n  }\n  mutateTicket(id, fn) {\n    const t = JSON.parse(JSON.stringify(this.getTicket(id)));\n    fn(t);\n    t.updatedAt = '刚刚';\n    this.saveOverlay({ tickets: { ...this.state.overlay.tickets, [id]: t } });\n  }\n\n  // ─── 数据访问(基础 fixture + overlay 合并) ───\n  allTickets() {\n    const { db, overlay } = this.state;\n    if (!db) return [];\n    const base = db.TICKETS.map(t => (overlay.tickets && overlay.tickets[t.id]) || t);\n    return [ ...(overlay.newTickets || []), ...base ];\n  }\n  getTicket(id) { return this.allTickets().find(t => t.id === id) || null; }\n  role() {\n    const { db } = this.state;\n    if (!db) return null;\n    return db.ROLES.find(r => r.id === this.state.roleId) || db.ROLES[0];\n  }\n  validEvidence(t) { return (t.evidence || []).filter(e => !e.degraded && !e.revokedAt); }\n  canRawFor(t) { const r = this.role(); return !!(r && r.canRaw && (r.project === '*' || r.project === t.project)); }\n\n  flashMsg(text, toneName) {\n    this.setState({ flashText: text, flashTone: toneName || 'green' });\n    clearTimeout(this._flashT);\n    this._flashT = setTimeout(() => this.setState({ flashText: '' }), 5000);\n  }\n  closeModal() {\n    this.setState({ modal: null });\n    if (this._lastFocus && this._lastFocus.focus) { try { this._lastFocus.focus(); } catch (e) {} }\n  }\n  openModal(m, ev) {\n    this._lastFocus = (ev && ev.currentTarget) || (typeof document !== 'undefined' ? document.activeElement : null);\n    this.setState({ modal: m });\n  }\n  modalRef = node => { if (node) { const f = node.querySelector('input,textarea,select,button'); if (f) setTimeout(() => f.focus(), 30); } };\n\n  // 审计事件追加(append-only)\n  appendAudit(t, ev) {\n    t.audit = [...(t.audit || []), { id: 'A-' + Date.now().toString().slice(-6), time: '刚刚', ...ev }];\n  }\n\n  // ─── 下载脱敏 mock 文件 ───\n  download(name, obj) {\n    const blob = new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a'); a.href = url; a.download = name; a.click();\n    setTimeout(() => URL.revokeObjectURL(url), 4000);\n  }\n\n  // ═══ renderVals 分区(后续增量填充) ═══\n  headerVals() {\n    const { db, route } = this.state;\n    const r = this.role();\n    const roleOptions = db ? db.ROLES.map(x => ({ id: x.id, label: x.name + ' · ' + x.person })) : [];\n    const navDefs = [\n      { key: 'tickets', label: '排查单', href: '#/tickets', views: ['list', 'detail'] },\n      { key: 'patrol', label: '巡检与盯梢', href: '#/patrol', views: ['patrol'] },\n      { key: 'connectors', label: '项目与连接器', href: '#/connectors', views: ['connectors'] },\n      { key: 'audit', label: '审计', href: '#/audit', views: ['audit'] }\n    ];\n    const navItems = navDefs.filter(n => r && r.nav.includes(n.key)).map(n => {\n      const cur = n.views.includes(route.view);\n      return { ...n, current: cur ? 'page' : undefined, bg: cur ? '#eef1f2' : 'transparent', color: cur ? '#242a31' : '#5c6470' };\n    });\n    navItems.push({ label: '飞书侧', href: '#/feishu', current: route.view === 'feishu' ? 'page' : undefined, bg: route.view === 'feishu' ? '#eef1f2' : 'transparent', color: route.view === 'feishu' ? '#242a31' : '#5c6470' });\n    const ft = this.tone(this.state.flashTone);\n    return {\n      showDemoBar: this.props.showDemoBar ?? true,\n      roleId: this.state.roleId, roleOptions, roleName: r ? r.name : '', personName: r ? r.person : '', personInitial: r ? r.person[0] : '',\n      dataset: this.state.dataset, navItems,\n      setRole: e => { this.setState({ roleId: e.target.value }, () => { this.persistPrefs(); this.setState({}); }); },\n      setDataset: e => { this.setState({ dataset: e.target.value }, () => this.persistPrefs()); },\n      resetDemo: () => { try { localStorage.removeItem(this.LS_KEY); } catch (er) {} this.setState({ overlay: { tickets: {}, newTickets: [] }, roleId: 'dev', dataset: 'current' }); this.nav('#/tickets'); this.flashMsg('演示数据已重置', 'green'); },\n      flash: !!this.state.flashText, flashText: this.state.flashText, flashColor: ft.c, flashBorder: ft.bd,\n      flashIcon: this.state.flashTone === 'red' ? '!' : (this.state.flashTone === 'amber' ? '◆' : '✓')\n    };\n  }\n\n  listVals() {\n    const { db, route, dataset, vw } = this.state;\n    const isList = route.view === 'list';\n    const r = this.role();\n    const all = this.allTickets();\n    const lm = db ? db.LIFECYCLE_META : {};\n\n    const stDefs = ['全部', '排查中', '等待补充', '待复核', '已确认', '证据不足', '人员终止', '平台失败'];\n    const stOf = t => (lm[t.lifecycle] ? lm[t.lifecycle].label : t.lifecycle);\n    const stMatch = (t, f) => f === '全部' || stOf(t) === f || (f === '待复核' && t.lifecycle === 'REVIEW');\n\n    const q = this.state.q.trim().toLowerCase();\n    const hitQ = t => {\n      if (!q) return true;\n      const c = t.clues || {};\n      return [t.no, t.title, t.listSummary, t.owner, t.project, t.service, c.traceId, c.appId, c.biz].filter(Boolean).join(' ').toLowerCase().includes(q);\n    };\n    const hitTime = t => {\n      if (!this.state.fTime) return true;\n      const recent = (t.createdAt || '').startsWith('07-12') || t.updatedAt === '刚刚';\n      if (this.state.fTime ==  || []).map(e => ({ ref: e.ref, run: e.runId, type: e.type, source: e.source, summary: e.summary, window: e.window, completeness: e.completeness, redaction: e.redaction, hash: e.hash, degraded: e.degraded || null })),\n        gaps: (t.runs || []).flatMap(r => r.gaps || []) };\n      this.download(t.no + '_证据包_脱敏.json', pack);\n      this.mutateTicket(t.id, tk => this.appendAudit(tk, { kind: 'HUMAN', actor: who, action: '导出证据包(脱敏)', tool: '—', result: 'OK', detail: '权限校验通过 · 内容:元数据+摘要 · 导出留痕', refs: [] }));\n      done('证据包已导出(脱敏 JSON);导出动作已写入审计');\n      return;\n    }\n    if (m.kind === 'exportTa' && t) {\n      this.download(t.no + '_审计_脱敏.json', { ticket: t.no, events: t.audit });\n      this.mutateTicket(t.id, tk => this.appendAudit(tk, { kind: 'HUMAN', actor: who, action: '导出本单审计', tool: '—', result: 'OK', detail: '权限校验通过 · 导出留痕', refs: [] }));\n      done('本单审计已导出;导出动作已写入审计');\n      return;\n    }\n    if (m.kind === 'exportAu') {\n      const tickets = this.allTickets();\n      this.download('TroubleShoot_审计账本_脱敏.json', { tickets: tickets.map(x => ({ no: x.no, events: x.audit })) });\n      const ev = { id: 'P-' + Date.now().toString().slice(-6), time: '07-12 刚刚', kind: 'HUMAN', actor: who + '(' + this.role().name + ')', action: '导出审计账本', tool: '—', result: 'OK', detail: '权限校验通过 · 脱敏导出 · 留痕', refs: [] };\n      this.saveOverlay({ platformAudit: [ ...(this.state.overlay.platformAudit || []), ev ] });\n      done('审计账本已导出;导出动作已写入平台审计');\n      return;\n    }\n    this.closeModal();\n  }\n\n  renderVals() {\n    if (!this.state.db) return { isList: true, navItems: [], roleOptions: [], rows: [], stTabs: [], statCards: [], deskRows: true, isCurrentSet: true, isTargetSet: false, personInitial: '', personName: '', roleName: '', rowCount: 0, showDemoBar: true };\n    return {\n      ...this.headerVals(),\n      ...this.listVals(),\n      ...this.detailVals(),\n      ...this.patrolVals(),\n      ...this.feishuVals(),\n      ...this.auditVals(),\n      ...this.connVals(),\n      ...this.modalVals()\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
