  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

d #ced3d8;background:#fff;color:#242a31\">\n        <sc-for list=\"{{ roleOptions }}\" as=\"ro\" hint-placeholder-count=\"5\">\n          <option value=\"{{ ro.id }}\">{{ ro.label }}<\u002Foption>\n        <\u002Fsc-for>\n      <\u002Fsc-raw-select>\n    <\u002Flabel>\n    <a href=\"#/feishu\" style=\"font-size:11.5px;font-weight:600;color:#1f6f4e;white-space:nowrap\">飞书侧原型 →<\u002Fa>\n    <button sc-camel-on-click=\"{{ resetDemo }}\" style=\"font:inherit;font-size:11.5px;cursor:pointer;padding:2px 10px;border-radius:5px;border:1px solid #ced3d8;background:#fff;color:#5c6470\" style-hover=\"color:#242a31;border-color:#aeb5bc\">重置演示数据<\u002Fbutton>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- 顶栏 -->\n  <header style=\"position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:16px;flex-wrap:wrap;min-height:50px;padding:6px 16px;background:#ffffff;border-bottom:1px solid #dde1e4\">\n    <a href=\"#/tickets\" style=\"display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-weight:700;font-size:14.5px;color:#242a31;text-decoration:none;white-space:nowrap\">\n      <span style=\"display:inline-block;width:9px;height:15px;background:#1f7a53;border-radius:2px\"><\u002Fspan>\n      TroubleShoot\n      <span style=\"font-weight:400;font-size:11.5px;color:#5c6470;letter-spacing:0.06em\">排障工作台<\u002Fspan>\n    <\u002Fa>\n    <nav aria-label=\"主导航\" style=\"display:flex;gap:2px;flex:1;min-width:0;overflow-x:auto\">\n      <sc-for list=\"{{ navItems }}\" as=\"ni\" hint-placeholder-count=\"3\">\n        <a href=\"{{ ni.href }}\" aria-current=\"{{ ni.current }}\" style=\"font-size:13px;padding:5px 11px;border-radius:6px;background: {{ ni.bg }};color: {{ ni.color }};font-weight:600;text-decoration:none;white-space:nowrap\" style-hover=\"text-decoration:none;background:#eef1f2\">{{ ni.label }}<\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fnav>\n    <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n      <span t    <a href=\"{{ row.href }}\" style=\"display:block;background:#ffffff;border:1px solid #dde1e4;border-radius:8px;padding:12px 14px;color:inherit;text-decoration:none\" style-hover=\"text-decoration:none;border-color:#c6cbd0\">\n          <span style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\">\n            <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;border:1px solid {{ row.stBorder }};color: {{ row.stColor }};background: {{ row.stBg }}\"><span aria-hidden=\"true\">{{ row.stIcon }}<\u002Fspan>{{ row.stLabel }}<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;font-weight:600;color: {{ row.envColor }}\">{{ row.env }}<\u002Fspan>\n            <sc-if value=\"{{ row.isTarget }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:10px;font-weight:700;color:#7a5d14;background:#faf4e4;border:1px solid #d9c79a;border-radius:4px;padding:0 5px\">目标态<\u002Fspan><\u002Fsc-if>\n            <span style=\"margin-left:auto;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;color:#8a919c\">{{ row.time }}<\u002Fspan>\n          <\u002Fspan>\n          <span style=\"display:block;font-size:13.5px;font-weight:550;margin-top:6px;line-height:1.45\">{{ row.title }}<\u002Fspan>\n          <span style=\"display:block;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;color:#38414b;margin-top:3px\">{{ row.no }}<\u002Fspan>\n          <span style=\"display:block;font-size:12px;color:#5c6470;margin-top:5px;line-height:1.5\">{{ row.summary }}<\u002Fspan>\n          <span style=\"display:flex;gap:12px;margin-top:7px;font-size:11px;color:#8a919c;flex-wrap:wrap\">\n            <span>{{ row.project }} · {{ row.service }}<\u002Fspan>\n            <span>证据 <b style=\"font-family:'JetBrains Mono',ui-monospace,monospace;color:#38414b\">{{ row.evidenceCount }}<\u002Fb><\u002Fspan>\n            <span>{{ row.runLabel }}<\u002Fspan>\n            <span>{{ row.owner }}<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- 空状态 -->\n    <sc-if value=\"{{ emptyList }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"text-align:center;padding:56px 20px;background:#ffffff;border:1px dashed #dde1e4;border-radius:8px\">\n        <p style=\"margin:0;font-size:14px;font-weight:600\">没有匹配的排查单<\u002Fp>\n        <p style=\"margin:6px 0 0;font-size:12.5px;color:#5c6470\">当前筛选:{{ filterDesc }}<\u002Fp>\n        <button sc-camel-on-click=\"{{ clearFilters }}\" style=\"margin-top:14px;font:inherit;font-size:13px;font-weight:600;cursor:pointer;padding:7px 16px;border-radius:6px;border:1px solid #1f7a53;background:transparent;color:#1f7a53\" style-hover=\"background:rgba(31,122,83,0.07)\">清除筛选<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <p style=\"margin:12px 2px 0;font-size:11.5px;color:#8a919c\">生产访问均经受控只读网关;群内只发送脱敏摘要与详情链接,完整证据按人员、项目和排查单权限查看并留痕。<\u002Fp>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ══════════ 排查单详情 ══════════ -->\n  <sc-if value=\"{{ isDetail }}\" hint-placeholder-val=\"{{ false }}\">\n  <main data-screen-label=\"排查单详情\" style=\"flex:1;width:100%;max-width:1180px;margin:0 auto;padding:18px 16px 88px;box-sizing:border-box\">\n    <a href=\"#/tickets\" style=\"font-size:12.5px;color:#5c6470;text-decoration:none\" style-hover=\"color:#1f7a53\">← 返回排查单列表<\u002Fa>\n\n    <sc-if value=\"{{ dMissing }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top:18px;text-align:center;padding:56px 20px;background:#ffffff;border:1px dashed #dde1e4;border-radius:8px\">\n        <p style=\"margin:0;font-size:14px;font-weight:600\">找不到该排查单<\u002Fp>\n        <p style=\"margin:6px 0 0;font-size:12.5px;color:#5c6470\">链接可能已过期,或该单已被移除;可从列表重新进入。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ dOk }}\" hint-placeholder-val=\"{{ false }}\">\n\n    <!-- 紧凑上下文头部 -->\n    <div style=\"margin-top:12px;padding-bottom:14px;border-bottom:2px solid #242a31\">\n      <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n        <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:15px;font-weight:700;letter-spacing:0.01em\">{{ dNo }}<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;letter-spacing:0.06em;padding:2px 10px;border:1.5px solid {{ dStColor }};color: {{ dStColor }};border-radius:5px;background: {{ dStBg }}\">\n          <span aria-hidden=\"true\" style=\"animation: {{ dStAnim }}\">{{ dStIcon }}<\u002Fspan>{{ dStLabel }}\n        <\u002Fspan>\n        <sc-if value=\"{{ dIsTarget }}\" hint-placeholder-val=\"{{ false }}\">\n          <span style=\"font-size:10.5px;font-weight:700;color:#7a5d14;background:#faf4e4;border:1px solid #d9c79a;border-radius:4px;padding:1px 7px\">目标态案例 · 模拟<\u002Fspan>\n        <\u002Fsc-if>\n        <span style=\"margin-left:auto;font-size:11.5px;color:#8a919c;white-space:nowrap\">更新 {{ dUpdated }}<\u002Fspan>\n      <\u002Fdiv>\n      <h1 style=\"margin:7px 0 0;font-size:16.5px;font-weight:600;line-height:1.5\">{{ dTitle }}<\u002Fh1>\n      <div style=\"display:flex;gap:8px 18px;flex-wrap:wrap;margin-top:9px;font-size:12px;color:#5c6470\">\n        <span>环境 <b style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;color: {{ dEnvColor }}\">{{ dEnv }}<\u002Fb><\u002Fspan>\n        <span>项目 <b style=\"color:#242a31;font-weight:500\">{{ dProject }} · {{ dService }}<\u002Fb><\u002Fspan>\n        <span>资源范围 <b style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;color:#38414b\">{{ dScopeRes }}<\u002Fb><\u002Fspan>\n        <span>时间窗 <b style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;color:#38414b\">{{ dScopeWin }}<\u002Fb><\u002Fspan>\n        <span>来源 <b style=\"color:#242a31;font-weight:500\">{{ dSource }}<\u002Fb><\u002Fspan>\n        <span>复核 <b style=\"color:#242a31;font-weight:500\">{{ dReviewer }}<\u002Fb><\u002Fspan>\n        <span>工单 <b style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;color:#38414b\">{{ dWorkOrder }}<\u002Fb><\u002Fspan>\n        <span>下一步负责 <b style=\"color:#242a31;font-weight:500\">{{ dNextOwner }}<\u002Fb><\u002Fspan>\n      <\u002Fdiv>\n      <sc-if value=\"{{ dTargetNote }}\" hint-placeholder-val=\"{{ false }}\">\n        <p style=\"margin:9px 0 0;font-size:11.5px;color:#7a5d14;background:#faf4e4;border:1px solid #e7dcba;border-radius:6px;padding:6px 10px\">{{ dTargetNote }}<\u002Fp>\n      <\u002Fsc-if>\n      <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-top:12px\">\n        <sc-for list=\"{{ dActions }}\" as=\"da\" hint-placeholder-count=\"3\">\n          <button sc-camel-on-click=\"{{ da.go }}\" disabled=\"{{ da.disabled }}\" title=\"{{ da.reason }}\" style=\"font:inherit;font-size:12.5px;font-weight:600;cursor: {{ da.cursor }};padding:6px 14px;border-radius:6px;border:1px solid {{ da.bd }};background: {{ da.bg }};color: {{ da.color }};opacity: {{ da.opacity }}\" style-hover=\"filter:brightness(0.96)\">{{ da.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <sc-if value=\"{{ dActionNote }}\" hint-placeholder-val=\"{{ false }}\">\n        <p style=\"margin:7px 0 0;font-size:11px;color:#8a919c\">{{ dActionNote }}<\u002Fp>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- Run 切换 + Tab -->\n    <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px\">\n      <div role=\"group\" aria-label=\"Run 切换\" style=\"display:flex;gap:4px;align-items:center\">\n        <span style=\"font-size:11px;color:#8a919c\">Run<\u002Fspan>\n        <sc-for list=\"{{ dRunPills }}\" as=\"rp\" hint-placeholder-count=\"2\">\n          <a href=\"{{ rp.href }}\" aria-current=\"{{ rp.current }}\" style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px;font-weight:600;padding:2px 10px;border-radius:999px;border:1px solid {{ rp.bd }};background: {{ rp.bg }};color: {{ rp.color }};text-decoration:none\" style-hover=\"text-decoration:none;border-color:#9aa1a8\">{{ rp.label }}<\u002Fa>\n        <\u002Fsc-for>\n        <span style=\"font-size:11px;color:#8a919c;margin-left:4px\">{{ dRunMeta }}<\u002Fspan>\n      <\u002Fdiv>\n      <nav role=\"tablist\" aria-label=\"详情分区\" style=\"margin-left:auto;display:flex;gap:2px;background:#e9ecee;border-radius:7px;padding:2px;overflow-x:auto;max-width:100%\">\n        <sc-for list=\"{{ dTabs }}\" as=\"dt\" hint-placeholder-count=\"4\">\n          <a role=\"tab\" aria-selected=\"{{ dt.selected }}\" href=\"{{ dt.href }}\" style=\"font-size:12.5px;font-weight:600;padding:4px 13px;border-radius:6px;background: {{ dt.bg }};color: {{ dt.color }};text-decoration:none;white-space:nowrap\" style-hover=\"text-decoration:none\">{{ dt.label }}<\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fnav>\n    <\u002Fdiv>\n\n    <!-- ─── Tab: 概览 ─── -->\n    <sc-if value=\"{{ dTabOverview }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"display:flex;flex-direction:column;gap:16px;margin-top:16px;max-width:980px\">\n\n      <!-- 等待补充 -->\n      <sc-if value=\"{{ pWait }}\" hint-placeholder-val=\"{{ false }}\">\n        <section style=\"background:#ffffff;border:1px solid #dde1e4;border-left:3px solid #b07a18;border-radius:8px;padding:16px 18px\">\n          <h2 style=\"margin:0;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#9a6a0f\">等待补充 · 系统只追问这一个关键问题<\u002Fh2>\n          <p style=\"margin:10px 0 0;font-size:14.5px;font-weight:600;line-height:1.65\">{{ wQuestion }}<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin-top:12px\">\n            <div style=\"background:#f7f8f9;border:1px solid #eef0f2;border-radius:6px;padding:10px 12px\">\n              <h3 style=\"margin:0 0 6px;font-size:11px;font-weight:600;color:#5c6470\">已有上下文<\u002Fh3>\n              <sc-for list=\"{{ wHave }}\" as=\"wh\" hint-placeholder-count=\"3\">\n                <p style=\"margin:0 0 3px;font-size:12px;line-height:1.55\">· {{ wh.t }}<\u002Fp>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"background:#f7f8f9;border:1px solid #eef0f2;border-radius:6px;padding:10px 12px\">\n              <h3 style=\"margin:0 0 6px;font-size:11px;font-weight:600;color:#5c6470\">超时与恢复条件<\u002Fh3>\n              <p style=\"margin:0 0 3px;font-size:12px;line-height:1.55\">· {{ wTimeout }}<\u002Fp>\n              <p style=\"margin:0;font-size:12px;line-height:1.55\">· {{ wResume }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <label style=\"display:block;margin-top:12px\">\n            <span style=\"font-size:12px;color:#5c6470\">补充回答(将固化时间窗并进入受控取证)<\u002Fspan>\n            <textarea sc-camel-on-input=\"{{ wSetText }}\" placeholder=\"例:对账日期 07-11,批次 sc-camel-job-id=recon-20260711-03\" style=\"display:block;width:100%;box-sizing:border-box;margin-top:5px;font:inherit;font-size:13px;min-height:64px;resize:vertical;padding:8px 11px;border-radius:6px;border:1px solid #dde1e4;background:#f7f8f9;color:#242a31\"><\u002Ftextarea>\n          <\u002Flabel>\n          <sc-if value=\"{{ wError }}\" hint-placeholder-val=\"{{ false }}\"><p role=\"alert\" style=\"margin:6px 0 0;font-size:12px;color:#bb3a2a\">{{ wError }}<\u002Fp><\u002Fsc-if>\n          <div style=\"display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap\">\n            <button sc-camel-on-click=\"{{ wSubmit }}\" style=\"font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;padding:7px 16px;border-radius:6px;border:1px solid #1f7a53;background:#1f7a53;color:#f2faf6\" style-hover=\"background:#176544\">提交补充 · 固化范围<\u002Fbutton>\n            <span style=\"font-size:11px;color:#8a919c\">补充前不会访问生产数据源,也不签发短期 token<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- 排查中 -->\n      <sc-if value=\"{{ pRun }}\" hint-placeholder-val=\"{{ false }}\">\n        <sc-if value=\"{{ rTakenOver }}\" hint-placeholder-val=\"{{ false }}\">\n          <section style=\"display:flex;align-items:flex-start;gap:12px;background:rgba(176,122,24,0.07);border:1px solid rgba(176,122,24,0.4);border-radius:8px;padding:13px 16px\">\n            <span aria-hidden=\"true\" style=\"flex:none;font-weight:700;color:#9a6a0f\">‖<\u002Fspan>\n            <div style=\"min-width:0;flex:1\">\n              <p style=\"margin:0;font-size:13px;font-weight:600;color:#7a5d14\">已由 {{ rTkBy }} 人工接管 · 受控步骤已暂停<\u002Fp>\n              <p style=\"margin:3px 0 0;font-size:11.5px;color:#5c6470;line-height:1.6\">原因:{{ rTkReason }} · 短期 token 已撤销,外部查询与调用预算冻结;总墙钟时长继续记录(总 {{ rWall }},接管中 {{ rTkFor }})。恢复时将重新校验人员/范围/工具健康并签发新 token。<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsection>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ rNotTaken }}\" hint-placeholder-val=\"{{ true }}\">\n          <section style=\"display:flex;align-items:center;gap:12px;background:rgba(36,97,173,0.06);border:1px solid rgba(36,97,173,0.32);border-radius:8px;padding:12px 16px\">\n            <span aria-hidden=\"true\" style=\"flex:none;width:8px;height:8px;border-radius:50%;background:#2461ad;animation:ts-pulse 1.4s ease-in-out infinite\"><\u002Fspan>\n            <div style=\"min-width:0\">\n              <p style=\"margin:0;font-size:13px;font-weight:600;color:#25507f\">{{ rAction }}<\u002Fp>\n              <p style=\"margin:2px 0 0;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;color:#5c6470\">Run {{ rRunNo }} · {{ rPhase }} · 主动执行 {{ rExec }} / 总墙钟 {{ rWall }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsection>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ showBudget }}\" hint-placeholder-val=\"{{ true }}\">\n        <section style=\"background:#ffffff;border:1px solid #dde1e4;border-radius:8px;padding:14px 18px\">\n          <h2 style=\"margin:0 0 10px;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#5c6470\">查询预算(来自当前 Run 状态)<\u002Fh2>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px\">\n            <sc-for list=\"{{ rBudgets }}\" as=\"rb\" hint-placeholder-count=\"3\">\n              <div>\n                <div style=\"display:flex;justify-content:space-between;font-size:11.5px;color:#5c6470;margin-bottom:4px\">\n                  <span>{{ rb.label }}<\u002Fspan>\n                  <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-weight:600;color:#242a31\">{{ rb.value }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"height:5px;border-radius:999px;background:#eef0f2;overflow:hidden\">\n                  <div style=\"height:100%;border-radius:999px;background: {{ rb.color }};width: {{ rb.pct }}\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <p style=\"margin:10px 0 0;font-size:11px;color:#8a919c\">{{ rBudgetNote }}<\u002Fp>\n        <\u002Fsection>\n        <\u002Fsc-if>\n      <\u002Fsc-if>\n\n      <!-- 候选待复核 -->\n      <sc-if value=\"{{ pReview }}\" hint-placeholder-val=\"{{ false }}\">\n        <section style=\"background:#ffffff;border:1px solid #dde1e4;border-left:3px solid #b07a18;border-radius:8px;overflow:hidden\">\n          <div style=\"display:flex;align-items:center;gap:10px;padding:11px 18px;border-bottom:1px solid #eef0f2;flex-wrap:wrap\">\n            <h2 style=\"margin:0;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#9a6a0f\">候选判断 · 待人工复核<\u002Fh2>\n            <span style=\"font-size:11px;color:#8a919c\">{{ cvLevel }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:14px 18px 16px\">\n            <p style=\"margin:0;font-size:14px;line-height:1.7;max-width:74ch\">{{ cvText }}<\u002Fp>\n            <p style=\"margin:8px 0 0;font-size:12px;color:#5c6470\"><b style=\"color:#38414b\">证据边界:<\u002Fb>{{ cvBoundary }}<\u002Fp>\n            <sc-if value=\"{{ cvGate }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;gap:10px;align-items:flex-start;margin-top:12px;background:rgba(187,58,42,0.05);border:1px solid rgba(187,58,42,0.3);border-radius:6px;padding:10px 13px\">\n                <span aria-hidden=\"true\" style=\"flex:none;font-weight:700;color:#bb3a2a\">▲<\u002Fspan>\n                <p style=\"margin:0;font-size:12px;line-height:1.6;color:#5c6470\"><b style=\"color:#bb3a2a\">高可信反证门禁:<\u002Fb>{{ cvGateText }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ cvGateHandled }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;gap:10px;align-items:flex-start;margin-top:12px;background:rgba(27,122,78,0.05);border:1px solid rgba(27,122,78,0.3);border-radius:6px;padding:10px 13px\">\n                <span aria-hidden=\"true\" style=\"flex:none;font-weight:700;color:#1b7a4e\">✓<\u002Fspan>\n                <p style=\"margin:0;font-size:12px;line-height:1.6;color:#5c6470\">{{ cvGateHandledText }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-top:14px\">\n              <sc-for list=\"{{ cvActions }}\" as=\"cva\" hint-placeholder-count=\"4\">\n                <button sc-camel-on-click=\"{{ cva.go }}\" disabled=\"{{ cva.disabled }}\" title=\"{{ cva.reason }}\" style=\"font:inherit;font-size:12.5px;font-weight:600;cursor: {{ cva.cursor }};padding:7px 15px;border-radius:6px;border:1px solid {{ cva.bd }};background: {{ cva.bg }};color: {{ cva.color }};opacity: {{ cva.opacity }}\" style-hover=\"filter:brightness(0.96)\">{{ cva.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <p style=\"margin:9px 0 0;font-size:11px;color:#8a919c\">{{ cvActionNote }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- 已确认 -->\n      <sc-if value=\"{{ pConfirmed }}\" hint-placeholder-val=\"{{ false }}\">\n        <section style=\"background:#ffffff;border:1px solid #dde1e4;border-left:3px solid #1b7a4e;border-radius:8px;overflow:hidden\">\n          <div style=\"display:flex;align-items:center;gap:10px;padding:11px 18px;border-bottom:1px solid #eef0f2;flex-wrap:wrap\">\n            <h2 style=\"margin:0;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#1b7a4e\">已确认结论<\u002Fh2>\n            <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;color:#5c6470\">{{ cfVersion }}<\u002Fspan>\n            <span style=\"margin-left:auto;font-size:11.5px;color:#8a919c\">复核人 {{ cfReviewer }} · {{ cfAt }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:14px 18px 16px\">\n            <p style=\"margin:0;font-size:14px;line-height:1.7;max-width:74ch\">{{ cfText }}<\u002Fp>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px;margin-top:12px\">\n              <div style=\"background:#f7f8f9;border:1px solid #eef0f2;border-radius:6px;padding:10px 12px\">\n                <h3 style=\"margin:0 0 4px;font-size:11px;font-weight:600;color:#5c6470\">影响摘要<\u002Fh3>\n                <p style=\"margin:0;font-size:12.5px;line-height:1.6\">{{ cfImpact }}<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"background:#f7f8f9;border:1px solid #eef0f2;border-radius:6px;padding:10px 12px\">\n                <h3 style=\"margin:0 0 4px;font-size:11px;font-weight:600;color:#5c6470\">证据边界<\u002Fh3>\n                <p style=\"margin:0;font-size:12.5px;line-height:1.6\">{{ cfBoundary }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-top:12px;border:1px solid #dde1e4;border-left:3px solid #1b7a4e;border-radius:6px;background:#fbfdfc;padding:13px 16px\">\n              <h3 style=\"margin:0;display:flex;align-items:center;gap:9px\">\n                <span aria-hidden=\"true\" style=\"display:grid;place-items:center;width:22px;height:22px;border-radius:6px;background:rgba(27,122,78,0.1);color:#1b7a4e;font-size:12px;font-weight:700\">✓<\u002Fspan>\n                <span style=\"font-size:13px;font-weight:700\">解决方案<\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:9.5px;letter-spacing:0.12em;color:#8a919c\">SOLUTION · 处置由人执行,平台不执行写操作<\u002Fspan>\n              <\u002Fh3>\n              <div style=\"display:flex;flex-direction:column;gap:13px;margin-top:12px\">\n                <sc-for list=\"{{ cfPlans }}\" as=\"cp\" hint-placeholder-count=\"3\">\n                  <div style=\"min-width:0\">\n                    <p style=\"margin:0;font-size:12.5px;font-weight:700\"><span style=\"color: {{ cp.color }}\">{{ cp.i }}. {{ cp.tag }}<\u002Fspan><span style=\"color:#5c6470;font-weight:600\"> · {{ cp.title }}<\u002Fspan><\u002Fp>\n                    <sc-for list=\"{{ cp.items }}\" as=\"cpi\" hint-placeholder-count=\"3\">\n                      <p style=\"margin:4px 0 0 6px;font-size:12.5px;line-height:1.65;color:#38414b\"><b style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;color: {{ cp.color }}\">{{ cpi.i }})<\u002Fb> {{ cpi.t }}<\u002Fp>\n                    <\u002Fsc-for>\n                    <sc-if value=\"{{ cp.hasCode }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"margin:8px 0 0 6px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;line-height:1.7;color:#38414b;background:#f4f5f6;border:1px solid #e3e5e8;border-radius:6px;padding:10px 13px;white-space:pre-wrap;overflow-x:auto;overflow-wrap:anywhere\">{{ cp.code }}<\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- 证据不足 -->\n      <sc-if value=\"{{ pInsuf }}\" hint-placeholder-val=\"{{ false }}\">\n        <section style=\"background:#ffffff;border:1px solid #dde1e4;border-left:3px solid #5f6874;border-radius:8px;padding:14px 18px\">\n          <h2 style=\"margin:0;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#5f6874\">证据不足 · 挂起(不是业务结论)<\u002Fh2>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px;margin-top:11px\">\n            <div style=\"background:#f7f8f9;border:1px solid #eef0f2;border-radius:6px;padding:10px 12px\">\n              <h3 style=\"margin:0 0 6px;font-size:11px;font-weight:600;color:#1b7a4e\">已经证明<\u002Fh3>\n              <sc-for list=\"{{ isProven }}\" as=\"ip\" hint-placeholder-count=\"3\"><p style=\"margin:0 0 4px;font-size:12px;line-height:1.6\">· {{ ip.t }}<\u002Fp><\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"background:#f7f8f9;border:1px solid #eef0f2;border-radius:6px;padding:10px 12px\">\n              <h3 style=\"margin:0 0 6px;font-size:11px;font-weight:600;color:#bb3a2a\">缺少什么<\u002Fh3>\n              <sc-for list=\"{{ isMissing }}\" as=\"im\" hint-placeholder-count=\"1\"><p style=\"margin:0 0 4px;font-size:12px;line-height:1.6\">· {{ im.t }}<\u002Fp><\u002Fsc-for>\n              <h3 style=\"margin:8px 0 4px;font-size:11px;font-weight:600;color:#5c6470\">为何当前不能继续<\u002Fh3>\n              <p style=\"margin:0;font-size:12px;line-height:1.6\">{{ isWhy }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:10px 0 0;font-size:12px;color:#5c6470\"><b style=\"color:#38414b\">恢复条件:<\u002Fb>{{ isResume }}<\u002Fp>\n        <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- 人员终止 -->\n      <sc-if value=\"{{ pTerm }}\" hint-placeholder-val=\"{{ false }}\">\n        <section style=\"background:#ffffff;border:1px solid #dde1e4;border-left:3px solid #5f6874;border-radius:8px;padding:14px 18px\">\n          <h2 style=\"margin:0;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#5f6874\">人员终止<\u002Fh2>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px 18px;margin-top:10px;font-size:12.5px;line-height:1.7\">\n            <span>终止人 <b>{{ tmBy }}<\u002Fb> · {{ tmAt }}<\u002Fspan>\n            <span>短期 token <b style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px\">{{ tmToken }}<\u002Fb><\u002Fspan>\n            <span>群内通知 <b style=\"color:#1b7a4e\">{{ tmNotify }}<\u002Fb><\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"margin:8px 0 0;font-size:12.5px;color:#5c6470\"><b style=\"color:#38414b\">终止原因:<\u002Fb>{{ tmReason }}<\u002Fp>\n        <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- 平台失败 -->\n      <sc-if value=\"{{ pFail }}\" hint-placeholder-val=\"{{ false }}\">\n        <section style=\"background:#ffffff;border:1px solid rgba(187,58,42,0.4);border-left:3px solid #bb3a2a;border-radius:8px;padding:14px 18px\">\n          <h2 style=\"margin:0;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#bb3a2a\">平台失败 · 取证被中断(不是业务结论,也不是证据不足)<\u002Fh2>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px;margin-top:11px\">\n            <div style=\"background:#f7f8f9;border:1px solid #eef0f2;border-radius:6px;padding:10px 12px\">\n              <h3 style=\"margin:0 0 4px;font-size:11px;font-weight:600;color:#5c6470\">故障组件<\u002Fh3>\n              <p style=\"margin:0;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px;line-height:1.6\">{{ pfComponent }}<\u002Fp>\n              <p style=\"margin:6px 0 0;font-size:12px;line-height:1.6\">{{ pfWhat }}<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"background:#f7f8f9;border:1px solid #eef0f2;border-radius:6px;padding:10px 12px\">\n              <h3 style=\"margin:0 0 4px;font-size:11px;font-weight:600;color:#5c6470\">重试 / 恢复条件<\u002Fh3>\n              <p style=\"margin:0;font-size:12px;line-height:1.6\">{{ pfRetry }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:10px 0 0;font-size:12px;color:#5c6470\">{{ pfNotBiz }}<\u002Fp>\n          <sc-if value=\"{{ pfNotifyFail }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;gap:10px;align-items:flex-start;margin-top:11px;background:rgba(187,58,42,0.05);border:1px solid rgba(187,58,42,0.3);border-radius:6px;padding:10px 13px\">\n              <span aria-hidden=\"true\" style=\"flex:none;font-weight:700;color:#bb3a2a\">!<\u002Fspan>\n              <p style=\"margin:0;font-size:12px;line-height:1.6;color:#5c6470\"><b style=\"color:#bb3a2a\">终态通知发送失败:<\u002Fb>{{ pfNotifyText }} — Run 结果与诊断结论不受通知失败影响,不会回滚。<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- 当前判断与下一步(通用) -->\n      <sc-if value=\"{{ dJudge }}\" hint-placeholder-val=\"{{ false }}\">\n        <section style=\"background:#ffffff;border:1px solid #dde1e4;border-radius:8px;padding:13px 18px\">\n          <h2 style=\"margin:0 0 7px;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#5c6470\">当前判断与下一步<\u002Fh2>\n          <p style=\"margin:0;font-size:13.5px;line-height:1.7\">{{ dJudgeText }}<\u002Fp>\n          <p style=\"margin:6px 0 0;font-size:12.5px;color:#5c6470\">↳ {{ dJudgeNext }}<\u002Fp>\n        <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- 已核实事实 / 未知项 -->\n      <section style=\"background:#ffffff;border:1px solid #dde1e4;border-radius:8px;overflow:hidden\">\n        <div style=\"display:flex;align-items:center;padding:11px 18px;border-bottom:1px solid #eef0f2\">\n          <h2 style=\"margin:0;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#5c6470\">已核实事实与未知项<\u002Fh2>\n          <span style=\"margin-left:auto;font-size:11px;color:#8a919c\">未知项与事实同等重要<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr))\">\n          <div style=\"padding:13px 18px;border-right:1px solid #eef0f2\">\n            <h3 style=\"margin:0 0 9px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:0.08em;color:#1b7a4e;font-weight:700\">已核实事实<\u002Fh3>\n            <sc-if value=\"{{ dNoFacts }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"margin:0;font-size:12.5px;color:#8a919c\">尚无已核实事实(未开始取证)。<\u002Fp><\u002Fsc-if>\n            <div style=\"display:flex;flex-direction:column;gap:8px\">\n              <sc-for list=\"{{ dFacts }}\" as=\"fact\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;gap:9px;align-items:baseline\">\n                  <span aria-hidden=\"true\" style=\"flex:none;width:5px;height:5px;border-radius:50%;background:#1b7a4e;position:relative;top:-2px\"><\u002Fspan>\n                  <p style=\"margin:0;font-size:12.5px;line-height:1.6\">{{ fact.text }}\n                    <sc-for list=\"{{ fact.chips }}\" as=\"fc\" hint-placeholder-count=\"2\">\n                      <a href=\"{{ fc.href }}\" style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;font-weight:600;color:#1f6f4e\">[{{ fc.ref }}]<\u002Fa>\n                    <\u002Fsc-for>\n                  <\u002Fp>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:13px 18px\">\n            <h3 style=\"margin:0 0 9px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:0.08em;color:#9a6a0f;font-weight:700\">未知项 / 下一步<\u002Fh3>\n            <sc-if value=\"{{ dNoUnknowns }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"margin:0;font-size:12.5px;color:#8a919c\">无登记的未知项。<\u002Fp><\u002Fsc-if>\n            <div style=\"display:flex;flex-direction:column;gap:10px\">\n              <sc-for list=\"{{ dUnknowns }}\" as=\"unk\" hint-placeholder-count=\"2\">\n                <div style=\"display:flex;gap:9px;align-items:baseline\">\n                  <span aria-hidden=\"true\" style=\"flex:none;width:5px;height:5px;border-radius:50%;border:1.5px solid #9a6a0f;position:relative;top:-2px;box-sizing:border-box\"><\u002Fspan>\n                  <div>\n                    <p style=\"margin:0;font-size:12.5px;line-height:1.6\">{{ unk.text }}<\u002Fp>\n                    <p style=\"margin:2px 0 0;font-size:11.5px;color:#5c6470\">↳ {{ unk.next }}<\u002Fp>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- 候选原因与证据关系 -->\n      <sc-if value=\"{{ dHasHyps }}\" hint-placeholder-val=\"{{ true }}\">\n      <section>\n        <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:9px;flex-wrap:wrap\">\n          <h2 style=\"margin:0;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#5c6470\">候选原因与证据<\u002Fh2>\n          <span style=\"font-size:11px;color:#8a919c\">状态为证据关系,非概率;反证与支持同等保留,历史判断不删除<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px\">\n          <sc-for list=\"{{ dHyps }}\" as=\"hyp\" hint-placeholder-count=\"3\">\n            <article style=\"background:#ffffff;border:1px solid #dde1e4;border-radius:8px;padding:13px 15px\">\n              <header style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\">\n                <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;font-weight:700\">{{ hyp.ref }}<\u002Fspan>\n                <span style=\"display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;letter-spacing:0.06em;padding:1px 8px;border-radius:4px;border:1px solid {{ hyp.stBd }};color: {{ hyp.stColor }};background: {{ hyp.stBg }}\"><span aria-hidden=\"true\">{{ hyp.stIcon }}<\u002Fspan>{{ hyp.stLabel }}<\u002Fspan>\n              <\u002Fheader>\n              <p style=\"margin:8px 0 0;font-size:12.5px;line-height:1.6\">{{ hyp.text }}<\u002Fp>\n              <p style=\"margin:7px 0 0;font-size:11px;color:#8a919c;line-height:1.55\">变化原因:{{ hyp.changeReason }}<\u002Fp>\n              <div style=\"margin-top:10px;padding-top:9px;border-top:1px dashed #dde1e4;display:flex;flex-direction:column;gap:5px;font-size:11.5px\">\n                <div style=\"display:flex;gap:6px;align-items:baseline;flex-wrap:wrap\"><span style=\"flex:none;width:34px;color:#1b7a4e;font-weight:600\">支持<\u002Fspan>\n                  <sc-for list=\"{{ hyp.sup }}\" as=\"hs\" hint-placeholder-count=\"2\"><a href=\"{{ hs.href }}\" style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;font-weight:600;color:#1f6f4e\">{{ hs.ref }}<\u002Fa><\u002Fsc-for>\n                  <sc-if value=\"{{ hyp.noSup }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#8a919c\">—<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:6px;align-items:baseline;flex-wrap:wrap\"><span style=\"flex:none;width:34px;color:#bb3a2a;font-weight:600\">反证<\u002Fspan>\n                  <sc-for list=\"{{ hyp.ref2 }}\" as=\"hr\" hint-placeholder-count=\"1\"><a href=\"{{ hr.href }}\" style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;font-weight:600;color:#bb3a2a\">{{ hr.ref }}<\u002Fa><\u002Fsc-for>\n                  <sc-if value=\"{{ hyp.noRef }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#8a919c\">—<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:6px;align-items:baseline\"><span style=\"flex:none;width:34px;color:#5c6470;font-weight:600\">缺口<\u002Fspan><span style=\"color:#5c6470;line-height:1.5\">{{ hyp.gapText }}<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Farticle>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- 原始输入(默认收起) -->\n      <sc-if value=\"{{ ovShowInput }}\" hint-placeholder-val=\"{{ true }}\">\n      <section style=\"background:#ffffff;border:1px solid #dde1e4;border-radius:8px;overflow:hidden\">\n        <button sc-camel-on-click=\"{{ dToggleInput }}\" aria-expanded=\"{{ dInputOpenAria }}\" style=\"width:100%;font:inherit;text-align:left;border:none;background:none;cursor:pointer;display:flex;align-items:center;gap:10px;padding:11px 18px;flex-wrap:wrap\" style-hover=\"background:#f7f8f9\">\n          <span style=\"font-size:12px;font-weight:700;letter-spacing:0.08em;color:#5c6470\">原始输入与线索<\u002Fspan>\n          <span style=\"display:flex;gap:5px;flex-wrap:wrap;min-width:0\">\n            <sc-for list=\"{{ dClueChips }}\" as=\"dcc\" hint-placeholder-count=\"3\">\n              <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;padding:1px 7px;border-radius:4px;background:#f2f4f5;border:1px solid #dde1e4;color:#38414b;white-space:nowrap\">{{ dcc.k }} <b style=\"font-weight:600\">{{ dcc.v }}<\u002Fb><\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fspan>\n          <span style=\"margin-left:auto;font-size:11px;color:#8a919c;white-space:nowrap\">{{ dInputToggle }}<\u002Fspan>\n        <\u002Fbutton>\n        <sc-if value=\"{{ dInputOpen }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:0 18px 13px\">\n            <p style=\"margin:0;font-size:12px;color:#5c6470;line-height:1.65\">来源:{{ dSource }} · 原始告警/输入仅作登记与解析线索,不直接当作事实;解析出的线索用于固化排查范围。原文按数据等级与人员权限在「证据与查询」中查看并留痕。<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsection>\n\n      <\u002Fsc-if>\n\n      <!-- Run 安全摘要 -->\n      <sc-if value=\"{{ ovShowSec }}\" hint-placeholder-val=\"{{ true }}\">\n      <section style=\"background:#ffffff;border:1px solid #dde1e4;border-radius:8px;padding:13px 18px\">\n        <h2 style=\"margin:0 0 9px;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#5c6470\">当前 Run 安全摘要<\u002Fh2>\n        <sc-if value=\"{{ dNoToken }}\" hint-placeholder-val=\"{{ false }}\">\n          <p style=\"margin:0;font-size:12.5px;color:#5c6470\">{{ dTokenNote }}<\u002Fp>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ dHasToken }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:7px 18px;font-size:12px;line-height:1.7\">\n            <span>tokenId 摘要 <b style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px\">{{ tkDigest }}<\u002Fb><\u002Fspan>\n            <span>能力 <b style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px\">{{ tkCaps }}<\u002Fb><\u002Fspan>\n            <span>范围 <b style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px\">{{ tkScope }}<\u002Fb><\u002Fspan>\n            <span>TTL / 预算 <b style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px\">{{ tkTtl }}<\u002Fb><\u002Fspan>\n            <span>状态 <b style=\"color: {{ tkStColor }}\">{{ tkStatus }}<\u002Fb><\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"margin:8px 0 0;font-size:11px;color:#8a919c\">token 明文仅由隔离 CLI 子进程单次获取,平台只保存 SHA-256;绑定排查单/Run/CLI 会话/能力/环境/资源/时间窗/预算与截止时间,结束、超时、中断或 CLI 退出即撤销。此处永不展示 token 内容。<\u002Fp>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ dHasTools }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid #eef0f2\">\n            <span style=\"font-size:11px;color:#8a919c;align-self:center\">工具健康(预检快照)<\u002Fspan>\n            <sc-for list=\"{{ dTools }}\" as=\"dtl\" hint-placeholder-count=\"4\">\n              <span title=\"{{ dtl.note }}\" style=\"display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;font-weight:600;padding:1px 8px;border-radius:4px;border:1px solid {{ dtl.bd }};color: {{ dtl.color }};background: {{ dtl.bg }}\">{{ dtl.icon }} {{ dtl.tool }} {{ dtl.label }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsection>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ─── Tab: 证据与查询 ─── -->\n    <sc-if value=\"{{ dTabEvidence }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"display:flex;flex-direction:column;gap:16px;margin-top:16px\">\n\n      <section style=\"background:#ffffff;border:1px solid #dde1e4;border-radius:8px;overflow:hidden\">\n        <div style=\"display:flex;align-items:center;gap:10px;padding:11px 18px;border-bottom:1px solid #eef0f2;flex-wrap:wrap\">\n          <h2 style=\"margin:0;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#5c6470\">证据链<\u002Fh2>\n          <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;color:#8a919c\">有效 {{ evValidCount }} · 降级 {{ evDegradedCount }}<\u002Fspan>\n          <span style=\"margin-left:auto;font-size:11px;color:#8a919c\">拒绝与失败不计入有效证据 · 点击行查看来源与脱敏详情<\u002Fspan>\n        <\u002Fdiv>\n        <sc-if value=\"{{ evEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n          <p style=\"margin:0;padding:18px;font-size:12.5px;color:#8a919c\">本单尚无证据(未开始受控取证)。<\u002Fp>\n        <\u002Fsc-if>\n        <div style=\"overflow-x:auto\">\n          <div style=\"min-width:860px\">\n            <sc-for list=\"{{ evRows }}\" as=\"ev\" hint-placeholder-count=\"6\">\n              <button sc-camel-on-click=\"{{ ev.open }}\" style=\"width:100%;font:inherit;text-align:left;border:none;background: {{ ev.rowBg }};cursor:pointer;display:grid;grid-template-columns:56px 46px 96px minmax(240px,1fr) 130px 96px;gap:10px;align-items:center;padding:10px 18px;border-bottom:1px solid #eef0f2\" style-hover=\"background:#f7f8f9\">\n                <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px;font-weight:700;color:#1f6f4e\">[{{ ev.ref }}]<\u002Fspan>\n                <span style=\"font-size:11px;color:#5c6470\">{{ ev.type }}<\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;color:#5c6470\">{{ ev.source }} · R{{ ev.runNo }}<\u002Fspan>\n                <span style=\"font-size:12.5px;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical\">{{ ev.summary }} <sc-if value=\"{{ ev.isLimited }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:10px;font-weight:700;color:#9a6a0f;background:rgba(176,122,24,0.1);border:1px solid rgba(176,122,24,0.4);border-radius:3px;padding:0 4px;white-space:nowrap\">受限反证<\u002Fspan><\u002Fsc-if> <sc-if value=\"{{ ev.isHigh }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:10px;font-weight:700;color:#bb3a2a;background:rgba(187,58,42,0.08);border:1px solid rgba(187,58,42,0.38);border-radius:3px;padding:0 4px;white-space:nowrap\">高可信反证<\u002Fspan><\u002Fsc-if><\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;color:#8a919c\">{{ ev.window }}<\u002Fspan>\n                <span style=\"justify-self:start;display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;padding:1px 8px;border-radius:4px;border:1px solid {{ ev.stBd }};color: {{ ev.stColor }};background: {{ ev.stBg }};white-space:nowrap\">{{ ev.stIcon }} {{ ev.stLabel }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section style=\"background:#ffffff;border:1px solid #dde1e4;border-radius:8px;overflow:hidden\">\n        <div style=\"display:flex;align-items:center;gap:10px;padding:11px 18px;border-bottom:1px solid #eef0f2;flex-wrap:wrap\">\n          <h2 style=\"margin:0;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#5c6470\">查询记录(Run {{ dRunNoSel }})<\u002Fh2>\n          <span style=\"font-size:11px;color:#8a919c\">全部经受控只读网关 · 四种结果分开登记,拒绝/失败只形成取证缺口<\u002Fspan>\n        <\u002Fdiv>\n        <sc-if value=\"{{ qEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n          <p style=\"margin:0;padding:18px;font-size:12.5px;color:#8a919c\">本 Run 未发起任何生产查询。<\u002Fp>\n        <\u002Fsc-if>\n        <div style=\"overflow-x:auto\">\n          <div style=\"min-width:900px\">\n            <sc-if value=\"{{ qHasRows }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:grid;grid-template-columns:64px 84px minmax(220px,1.4fr) 120px minmax(150px,1fr) 70px;gap:10px;padding:8px 18px;border-bottom:1px solid #dde1e4;background:#f7f8f9;font-size:11px;color:#5c6470;letter-spacing:0.03em\">\n              <span>时间<\u002Fspan><span>工具<\u002Fspan><span>API · 查询范围<\u002Fspan><span>结果<\u002Fspan><span>命中 / 缺口<\u002Fspan><span style=\"text-align:right\">耗时<\u002Fspan>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-for list=\"{{ qRows }}\" as=\"qr\" hint-placeholder-count=\"7\">\n              <div style=\"display:grid;grid-template-columns:64px 84px minmax(220px,1.4fr) 120px minmax(150px,1fr) 70px;gap:10px;align-items:start;padding:10px 18px;border-bottom:1px solid #eef0f2;background: {{ qr.rowBg }}\">\n                <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;color:#8a919c;padding-top:2px\">{{ qr.time }}<\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;font-weight:600;padding-top:1px\">{{ qr.tool }}<\u002Fspan>\n                <span style=\"min-width:0;display:block\">\n                  <span style=\"display:block;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;color:#38414b;overflow-wrap:anywhere\">{{ qr.api }}<\u002Fspan>\n                  <span style=\"display:block;font-size:11px;color:#8a919c;margin-top:1px;overflow-wrap:anywhere\">{{ qr.scope }} · 窗口 {{ qr.window }}<\u002Fspan>\n                <\u002Fspan>\n                <span style=\"display:block\">\n                  <span style=\"display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;padding:1px 8px;border-radius:4px;border:1px solid {{ qr.stBd }};color: {{ qr.stColor }};background: {{ qr.stBg }};white-space:nowrap\">{{ qr.stIcon }} {{ qr.stLabel }}<\u002Fspan>\n                  <sc-if value=\"{{ qr.hasReason }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"display:block;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:9.5px;color:#bb3a2a;margin-top:3px\">{{ qr.reason }}<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fspan>\n                <span style=\"display:block;min-width:0\">\n                  <sc-if value=\"{{ qr.hasEv }}\" hint-placeholder-val=\"{{ false }}\">\n                    <a href=\"{{ qr.evHref }}\" style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;font-weight:700;color:#1f6f4e\">[{{ qr.evRef }}]<\u002Fa>\n                  <\u002Fsc-if>\n                  <span style=\"font-size:11.5px;color:#5c6470\"> {{ qr.hits }}<\u002Fspan>\n                  <sc-if value=\"{{ qr.hasGap }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"display:block;font-size:11px;color:#9a6a0f;margin-top:2px;line-height:1.5\">缺口:{{ qr.gap }}<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fspan>\n                <span style=\"text-align:right;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;color:#8a919c\">{{ qr.ms }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ gapHas }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:11px 18px;background:#fbf9f3;border-top:1px solid #eef0f2\">\n            <h3 style=\"margin:0 0 6px;font-size:11px;font-weight:700;color:#9a6a0f;letter-spacing:0.06em\">取证缺口(不计入有效证据,不支持任何假设)<\u002Fh3>\n            <sc-for list=\"{{ gapRows }}\" as=\"gp\" hint-placeholder-count=\"2\">\n              <p style=\"margin:0 0 3px;font-size:12px;line-height:1.6;color:#5c6470\"><b style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;color:#9a6a0f\">{{ gp.ref }}<\u002Fb> {{ gp.text }}<\u002Fp>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsection>\n\n      <section style=\"background:#ffffff;border:1px solid #dde1e4;border-radius:8px;padding:12px 18px\">\n        <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n          <h2 style=\"margin:0;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#5c6470\">取证产物 Artifact<\u002Fh2>\n          <span style=\"font-size:11px;color:#8a919c\">{{ artCount }} 份 · 引用+哈希+TTL 登记 · 查看与下载留痕<\u002Fspan>\n        <\u002Fdiv>\n        <sc-if value=\"{{ artEmpty }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"margin:8px 0 0;font-size:12.5px;color:#8a919c\">本单无独立产物文件;证据摘要见证据链。<\u002Fp><\u002Fsc-if>\n        <div style=\"display:flex;flex-direction:column;gap:6px;margin-top:9px\">\n          <sc-for list=\"{{ artRows }}\" as=\"art\" hint-placeholder-count=\"2\">\n            <div style=\"display:flex;align-items:center;gap:10px;border:1px solid #eef0f2;border-radius:6px;padding:8px 12px;background:#f7f8f9;flex-wrap:wrap\">\n              <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;font-weight:600;overflow-wrap:anywhere;min-width:0\">{{ art.name }}<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;color:#8a919c;white-space:nowrap\">sha256 {{ art.hash }} · TTL {{ art.ttl }}<\u002Fspan>\n              <span style=\"margin-left:auto;display:flex;gap:8px;align-items:center\">\n                <a href=\"{{ art.evHref }}\" style=\"font-size:11.5px;white-space:nowrap\">证据 [{{ art.evRef }}]<\u002Fa>\n                <button disabled=\"{{ true }}\" title=\"{{ art.dlReason }}\" style=\"font:inherit;font-size:11.5px;padding:3px 10px;border-radius:5px;border:1px solid #dde1e4;background:#f2f4f5;color:#8a919c;cursor:not-allowed\">生产下载未启用<\u002Fbutton>\n              <\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 0;font-size:10.5px;color:#8a919c\">生产 Artifact 下载受项目授权、加密、TTL、哈希校验、下载审计与到期物理删除门禁;门禁未验证前不提供下载(登录状态不构成下载授权)。<\u002Fp>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n    <!-- ─── Tab: 过程与消息 ─── -->\n    <sc-if value=\"{{ dTabProcess }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"display:flex;flex-wrap:wrap;gap:16px;margin-top:16px;align-items:flex-start\">\n\n      <section style=\"flex:1 1 420px;min-width:0;background:#ffffff;border:1px solid #dde1e4;border-radius:8px;overflow:hidden\">\n        <div style=\"display:flex;align-items:center;gap:10px;padding:11px 18px;border-bottom:1px solid #eef0f2;flex-wrap:wrap\">\n          <h2 style=\"margin:0;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#5c6470\">执行轨迹(Run {{ dRunNoSel }})<\u002Fh2>\n          <span style=\"margin-left:auto;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;color:#8a919c\">{{ prRunState }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding:14px 18px\">\n          <sc-if value=\"{{ prSnapshot }}\" hint-placeholder-val=\"{{ false }}\">\n            <p style=\"margin:0 0 11px;font-size:11.5px;color:#5c6470;background:#f7f8f9;border:1px solid #eef0f2;border-radius:6px;padding:8px 11px;line-height:1.6\">{{ prSnapshotText }}<\u002Fp>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ prInherited }}\" hint-placeholder-val=\"{{ false }}\">\n            <p style=\"margin:0 0 11px;font-size:11.5px;color:#5c6470;background:#f7f8f9;border:1px solid #eef0f2;border-radius:6px;padding:8px 11px;line-height:1.6\"><b style=\"color:#38414b\">跨 Run 证据继承:<\u002Fb>{{ prInheritedText }}<\u002Fp>\n          <\u002Fsc-if>\n          <div style=\"position:relative;display:flex;flex-direction:column;gap:12px\">\n            <div aria-hidden=\"true\" style=\"position:absolute;top:8px;bottom:8px;left:4.5px;width:1px;background:#dde1e4\"><\u002Fdiv>\n            <sc-for list=\"{{ prSteps }}\" as=\"step\" hint-placeholder-count=\"4\">\n              <div style=\"position:relative;display:grid;grid-template-columns:10px minmax(0,1fr);gap:11px\">\n                <span aria-hidden=\"true\" style=\"z-index:1;width:9px;height:9px;margin-top:5px;border-radius:50%;background:#ffffff;border:2px solid {{ step.dot }};box-sizing:border-box;animation: {{ step.anim }}\"><\u002Fspan>\n                <div>\n                  <div style=\"display:flex;align-items:baseline;gap:8px;flex-wrap:wrap\">\n                    <span style=\"font-size:12.5px;font-weight:600;color: {{ step.titleColor }}\">{{ step.title }}<\u002Fspan>\n                    <span style=\"margin-left:auto;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;color:#8a919c;white-space:nowrap\">{{ step.time }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <p style=\"margin:2px 0 0;font-size:11.5px;color:#5c6470;line-height:1.55\">{{ step.detail }}<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1px;background:#eef0f2;border:1px solid #eef0f2;border-radius:6px;overflow:hidden;margin-top:14px\">\n            <sc-for list=\"{{ prTimes }}\" as=\"pt\" hint-placeholder-count=\"3\">\n              <div style=\"background:#ffffff;padding:8px 11px\">\n                <div style=\"font-size:10px;color:#8a919c\">{{ pt.label }}<\u002Fdiv>\n                <div style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:13px;font-weight:700;margin-top:1px\">{{ pt.value }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <p style=\"margin:8px 0 0;font-size:10.5px;color:#8a919c\">主动执行用时只统计受控步骤实际执行;接管期间暂停,总墙钟持续记录,避免审计时间失真。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <div style=\"flex:1 1 340px;min-width:0;display:flex;flex-direction:column;gap:16px\">\n        <section style=\"background:#ffffff;border:1px solid #dde1e4;border-radius:8px;overflow:hidden\">\n          <div style=\"display:flex;align-items:center;padding:11px 18px;border-bottom:1px solid #eef0f2\">\n            <h2 style=\"margin:0;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#5c6470\">消息与补充<\u002Fh2>\n            <span style=\"margin-left:auto;font-size:11px;color:#8a919c\">与飞书线程同步 · 补充不覆盖历史 · <a href=\"#/feishu\" style=\"font-size:11px\">飞书侧原型 →<\u002Fa><\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:13px 18px;display:flex;flex-direction:column;gap:10px\">\n            <sc-for list=\"{{ prMsgs }}\" as=\"msg\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;gap:11px;align-items:flex-start;border-left:2.5px solid {{ msg.edge }};padding:1px 0 1px 11px\">\n                <div style=\"min-width:0;flex:1\">\n                  <div style=\"display:flex;align-items:baseline;gap:8px;flex-wrap:wrap\">\n                    <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;font-weight:700;letter-spacing:0.06em;color: {{ msg.edge }}\">{{ msg.role }}<\u002Fspan>\n                    <span style=\"font-size:12px;font-weight:600\">{{ msg.who }}<\u002Fspan>\n                    <span style=\"margin-left:auto;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;color:#8a919c\">{{ msg.time }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <p style=\"margin:3px 0 0;font-size:12px;line-height:1.6;color:#38414b\">{{ msg.text }}<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <section style=\"background:#ffffff;border:1px solid #dde1e4;border-radius:8px;overflow:hidden\">\n          <div style=\"display:flex;align-items:center;padding:11px 18px;border-bottom:1px solid #eef0f2\">\n            <h2 style=\"margin:0;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#5c6470\">对外通知<\u002Fh2>\n            <span style=\"margin-left:auto;font-size:11px;color:#8a919c\">送达状态与 Run 结果分开记录<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:12px 18px;display:flex;flex-direction:column;gap:8px\">\n            <sc-if value=\"{{ prNoNotify }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"margin:0;font-size:12.5px;color:#8a919c\">暂无对外通知。<\u002Fp><\u002Fsc-if>\n            <sc-for list=\"{{ prNotifs }}\" as=\"nt\" hint-placeholder-count=\"2\">\n              <div style=\"display:flex;gap:10px;align-items:flex-start\">\n                <span style=\"flex:none;display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;padding:1px 8px;border-radius:4px;border:1px solid {{ nt.bd }};color: {{ nt.color }};background: {{ nt.bg }};white-space:nowrap;margin-top:1px\">{{ nt.icon }} {{ nt.stLabel }}<\u002Fspan>\n                <div style=\"min-width:0\">\n                  <p style=\"margin:0;font-size:12px;line-height:1.55\">{{ nt.summary }} <span style=\"color:#8a919c\">· {{ nt.channel }} · {{ nt.time }}<\u002Fspan><\u002Fp>\n                  <sc-if value=\"{{ nt.failed }}\" hint-placeholder-val=\"{{ false }}\">\n                    <p style=\"margin:2px 0 0;font-size:11px;color:#bb3a2a;line-height:1.5\">失败原因:{{ nt.failReason }} · 已尝试 {{ nt.attempts }} 次 · {{ nt.nextRetry }}<\u002Fp>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <section style=\"background:#ffffff;border:1px solid #dde1e4;border-radius:8px;overflow:hidden\">\n          <div style=\"display:flex;align-items:center;padding:11px 18px;border-bottom:1px solid #eef0f2\">\n            <h2 style=\"margin:0;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#5c6470\">决定与版本(append-only)<\u002Fh2>\n          <\u002Fdiv>\n          <div style=\"padding:12px 18px;display:flex;flex-direction:column;gap:9px\">\n            <sc-for list=\"{{ prDecisions }}\" as=\"dc\" hint-placeholder-count=\"2\">\n              <div style=\"display:flex;gap:10px;align-items:baseline\">\n                <span style=\"flex:none;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;font-weight:700;color:#5c6470\">{{ dc.id }}<\u002Fspan>\n                <div style=\"min-width:0\">\n                  <p style=\"margin:0;font-size:12px;line-height:1.55\"><b>{{ dc.title }}<\u002Fb> <span style=\"color:#8a919c\">· {{ dc.actor }} · {{ dc.time }}<\u002Fspan> <sc-if value=\"{{ dc.hasVer }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;font-weight:700;color:#1b7a4e;background:rgba(27,122,78,0.08);border:1px solid rgba(27,122,78,0.3);border-radius:3px;padding:0 5px\">{{ dc.version }}<\u002Fspan><\u002Fsc-if><\u002Fp>\n                  <sc-if value=\"{{ dc.hasDetail }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"margin:2px 0 0;font-size:11.5px;color:#5c6470;line-height:1.55\">{{ dc.detail }}<\u002Fp><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n    <!-- ─── Tab: 审计 ─── -->\n    <sc-if value=\"{{ dTabAudit }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"display:flex;flex-direction:column;gap:14px;margin-top:16px\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));border:1px solid #dde1e4;border-radius:8px;overflow:hidden;background:#ffffff\">\n        <sc-for list=\"{{ taStats }}\" as=\"tst\" hint-placeholder-count=\"6\">\n          <div style=\"padding:10px 14px;border-right:1px solid #eef0f2;margin-right:-1px\">\n            <div style=\"font-size:10.5px;color:#8a919c\">{{ tst.label }}<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:16px;font-weight:700;margin-top:1px;color: {{ tst.color }}\">{{ tst.value }}<\u002Fdiv>\n            <div style=\"font-size:10px;color:#8a919c\">{{ tst.sub }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <section style=\"background:#ffffff;border:1px solid #dde1e4;border-radius:8px;overflow:hidden\">\n        <div style=\"display:flex;align-items:center;gap:10px;padding:11px 18px;border-bottom:1px solid #eef0f2;flex-wrap:wrap\">\n          <h2 style=\"margin:0;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#5c6470\">本单审计事件({{ taCount }})<\u002Fh2>\n          <span style=\"font-size:11px;color:#8a919c\">append-only · 读取/下载/token 签发与撤销同样留痕<\u002Fspan>\n          <button sc-camel-on-click=\"{{ taExport }}\" disabled=\"{{ taExportDisabled }}\" title=\"{{ taExportReason }}\" style=\"margin-left:auto;font:inherit;font-size:11.5px;font-weight:600;cursor: {{ taExportCursor }};padding:4px 12px;border-radius:5px;border:1px solid {{ taExportBd }};background:transparent;color: {{ taExportColor }};opacity: {{ taExportOpacity }}\" style-hover=\"filter:brightness(0.95)\">导出本单审计<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"overflow-x:auto\">\n          <div style=\"min-width:880px\">\n            <sc-for list=\"{{ taRows }}\" as=\"ar\" hint-placeholder-count=\"8\">\n              <div style=\"display:grid;grid-template-columns:58px 76px minmax(230px,1.4fr) minmax(190px,1fr) 96px;gap:10px;padding:10px 18px;border-bottom:1px solid #eef0f2;align-items:start;background: {{ ar.rowBg }}\">\n                <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;color:#8a919c;padding-top:2px\">{{ ar.time }}<\u002Fspan>\n                <span style=\"justify-self:start;display:inline-flex;align-items:center;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;font-weight:700;letter-spacing:0.05em;padding:2px 8px;border-radius:4px;border:1px solid {{ ar.kBd }};color: {{ ar.kColor }};background: {{ ar.kBg }};white-space:nowrap\">{{ ar.kLabel }}<\u002Fspan>\n                <span style=\"min-width:0;display:block\">\n                  <span style=\"display:block;font-size:12.5px;font-weight:600\">{{ ar.action }}<\u002Fspan>\n                  <span style=\"display:block;font-size:11px;color:#5c6470;line-height:1.55;margin-top:1px;overflow-wrap:anywhere\">{{ ar.detail }}<\u002Fspan>\n                <\u002Fspan>\n                <span style=\"display:block;min-width:0\">\n                  <span style=\"display:block;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;color: {{ ar.resColor }};font-weight:700\">{{ ar.resLabel }}<\u002Fspan>\n                  <span style=\"display:block;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;color:#8a919c;margin-top:1px;overflow-wrap:anywhere\">{{ ar.meta }}<\u002Fspan>\n                <\u002Fspan>\n                <span style=\"display:flex;flex-wrap:wrap;gap:4px;justify-content:flex-end\">\n                  <sc-for list=\"{{ ar.chips }}\" as=\"rc\" hint-placeholder-count=\"1\">\n                    <a href=\"{{ rc.href }}\" style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;border:1px solid rgba(31,111,78,0.35);background:rgba(31,111,78,0.06);color:#1f6f4e;white-space:nowrap;text-decoration:none\" style-hover=\"text-decoration:none;background:rgba(31,111,78,0.12)\">{{ rc.label }}<\u002Fa>\n                  <\u002Fsc-for>\n                <\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <p style=\"margin:0 2px;font-size:11px;color:#8a919c\">审计事件不可修改、不可删除;区分排查步骤、逻辑工具调用、云 API 请求、有效证据与 Artifact 的计数口径,全部由当前数据实时计算。完整跨单账本见 <a href=\"#/audit\">审计<\u002Fa>(按角色开放)。<\u002Fp>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n    <\u002Fsc-if>\n\n    <!-- 证据详情抽屉 -->\n    <sc-if value=\"{{ dwOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div sc-camel-on-click=\"{{ dwClose }}\" style=\"position:fixed;inset:0;z-index:55;background:rgba(20,26,32,0.35)\"><\u002Fdiv>\n      <aside role=\"dialog\" aria-modal=\"true\" aria-label=\"证据详情\" style=\"position:fixed;z-index:60;background:#ffffff;border:1px solid #dde1e4;box-shadow:0 18px 60px rgba(20,26,32,0.25);display:flex;flex-direction:column;top: {{ dwTop }};right: {{ dwRight }};bottom: {{ dwBottom }};left: {{ dwLeft }};width: {{ dwWidth }};max-width:100vw;max-height: {{ dwMaxH }};border-radius: {{ dwRadius }};box-sizing:border-box\">\n        <div style=\"display:flex;align-items:center;gap:9px;padding:13px 18px;border-bottom:1px solid #eef0f2;flex-wrap:wrap\">\n          <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:13px;font-weight:700;color:#1f6f4e\">[{{ dwRef }}]<\u002Fspan>\n          <span style=\"font-size:11.5px;color:#5c6470\">{{ dwType }} · {{ dwSource }} · Run {{ dwRunNo }}<\u002Fspan>\n          <span style=\"display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;padding:1px 8px;border-radius:4px;border:1px solid {{ dwStBd }};color: {{ dwStColor }};background: {{ dwStBg }}\">{{ dwStIcon }} {{ dwStLabel }}<\u002Fspan>\n          <button sc-camel-on-click=\"{{ dwClose }}\" aria-label=\"关闭证据详情\" style=\"margin-left:auto;font:inherit;font-size:16px;line-height:1;border:none;background:none;cursor:pointer;color:#8a919c;padding:4px\" style-hover=\"color:#242a31\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"flex:1;overflow-y:auto;padding:14px 18px 18px\">\n          <p style=\"margin:0;font-size:13px;line-height:1.7\">{{ dwSummary }}<\u002Fp>\n          <sc-if value=\"{{ dwDegraded }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;gap:9px;align-items:flex-start;margin-top:10px;background:rgba(176,122,24,0.08);border:1px solid rgba(176,122,24,0.4);border-radius:6px;padding:9px 12px\">\n              <span aria-hidden=\"true\" style=\"flex:none;font-weight:700;color:#9a6a0f\">▽<\u002Fspan>\n              <p style=\"margin:0;font-size:11.5px;line-height:1.6;color:#5c6470\"><b style=\"color:#9a6a0f\">已降级:<\u002Fb>{{ dwDegradedText }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"margin-top:12px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;color:#38414b;background:#f7f8f9;border:1px solid #eef0f2;border-radius:6px;padding:10px 12px;line-height:1.65;overflow-wrap:anywhere\">{{ dwQuery }}<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:7px 16px;margin-top:12px;font-size:11.5px;line-height:1.65\">\n            <span style=\"color:#8a919c\">查询范围 <b style=\"display:block;color:#242a31;font-weight:500\">{{ dwScope }}<\u002Fb><\u002Fspan>\n            <span style=\"color:#8a919c\">时间窗 <b style=\"display:block;color:#242a31;font-weight:500;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px\">{{ dwWindow }}<\u002Fb><\u002Fspan>\n            <span style=\"color:#8a919c\">完整性 <b style=\"display:block;color:#242a31;font-weight:500\">{{ dwCompleteness }}<\u002Fb><\u002Fspan>\n            <span style=\"color:#8a919c\">脱敏状态 <b style=\"display:block;color:#242a31;font-weight:500\">{{ dwRedaction }}<\u002Fb><\u002Fspan>\n            <span style=\"color:#8a919c\">新鲜度 <b style=\"display:block;color: {{ dwFreshColor }};font-weight:600\">{{ dwFresh }} · 有效至 {{ dwValidUntil }}<\u002Fb><\u002Fspan>\n            <span style=\"color:#8a919c\">contentHash <b style=\"display:block;color:#242a31;font-weight:500;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;overflow-wrap:anywhere\">{{ dwHash }}<\u002Fb><\u002Fspan>\n            <span style=\"color:#8a919c\">来源查询 <b style=\"display:block;color:#242a31;font-weight:500;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px\">{{ dwProvenance }}<\u002Fb><\u002Fspan>\n            <span style=\"color:#8a919c\">evidenceRef <b style=\"display:block;color:#242a31;font-weight:500;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;overflow-wrap:anywhere\">{{ dwFullRef }}<\u002Fb><\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"margin-top:13px;padding-top:11px;border-top:1px solid #eef0f2\">\n            <h3 style=\"margin:0 0 7px;font-size:11px;font-weight:700;color:#5c6470;letter-spacing:0.06em\">与候选原因的关系<\u002Fh3>\n            <sc-if value=\"{{ dwNoRel }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"margin:0;font-size:12px;color:#8a919c\">未关联任何候选原因。<\u002Fp><\u002Fsc-if>\n            <sc-for list=\"{{ dwRels }}\" as=\"dr\" hint-placeholder-count=\"2\">\n              <p style=\"margin:0 0 4px;font-size:12px;line-height:1.6\"><b style=\"color: {{ dr.color }}\">{{ dr.kind }}<\u002Fb> <b style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px\">{{ dr.ref }}<\u002Fb> {{ dr.text }}<\u002Fp>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"margin-top:13px;padding-top:11px;border-top:1px solid #eef0f2\">\n            <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\">\n              <h3 style=\"margin:0;font-size:11px;font-weight:700;color:#5c6470;letter-spacing:0.06em\">原文与产物(L2 内容,按权限)<\u002Fh3>\n              <sc-if value=\"{{ dwCanRaw }}\" hint-placeholder-val=\"{{ false }}\">\n                <button sc-camel-on-click=\"{{ dwToggleRaw }}\" style=\"margin-left:auto;font:inherit;font-size:11.5px;font-weight:600;cursor:pointer;padding:3px 11px;border-radius:5px;border:1px solid rgba(31,122,83,0.4);background:rgba(31,122,83,0.05);color:#1f7a53\" style-hover=\"background:rgba(31,122,83,0.1)\">{{ dwRawLabel }}<\u002Fbutton>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ dwNoRaw }}\" hint-placeholder-val=\"{{ false }}\">\n                <span style=\"margin-left:auto;font-size:11px;color:#8a919c\">{{ dwNoRawReason }}<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <sc-if value=\"{{ dwRawOpen }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-top:9px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;color:#38414b;background:#f7f8f9;border:1px solid #eef0f2;border-radius:6px;padding:10px 12px;line-height:1.7;overflow-wrap:anywhere\">{{ dwRawText }}<\u002Fdiv>\n              <p style=\"margin:6px 0 0;font-size:10.5px;color:#8a919c\">本次查看已写入审计(读取留痕);展示内容为字段白名单+脱敏后的样例,L3 密钥类字段永不进入页面。<\u002Fp>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ dwHasArt }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;align-items:center;gap:10px;margin-top:9px;border:1px solid #eef0f2;border-radius:6px;padding:8px 12px;background:#f7f8f9;flex-wrap:wrap\">\n                <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;font-weight:600;overflow-wrap:anywhere;min-width:0\">{{ dwArtName }}<\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:9.5px;color:#8a919c;white-space:nowrap\">sha256 {{ dwArtHash }} · TTL {{ dwArtTtl }} · {{ dwArtRetention }}<\u002Fspan>\n                <button disabled=\"{{ true }}\" title=\"生产下载门禁未验证(项目授权/加密/TTL/哈希/审计/到期删除)\" style=\"margin-left:auto;font:inherit;font-size:11px;padding:3px 10px;border-radius:5px;border:1px solid #dde1e4;background:#f2f4f5;color:#8a919c;cursor:not-allowed\">生产下载未启用<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Faside>\n    <\u002Fsc-if>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n<!-- ══════════ 巡检与盯梢 ══════════ -->\n  <sc-if value=\"{{ isPatrol }}\" hint-placeholder-val=\"{{ false }}\">\n  <main data-screen-label=\"巡检与盯梢\" style=\"flex:1;width:100%;max-width:1180px;margin:0 auto;padding:22px 16px 72px;box-sizing:border-box\">\n    <div style=\"display:flex;align
